<div class="author-box">
  {{ with .Site.Params.avatar }}
  <img src="{{ . }}" alt="{{ $.Site.Params.author }}" class="author-avatar" width="64" height="64" loading="lazy">
  {{ end }}
  <div class="author-info">
    <strong>{{ .Site.Params.author }}</strong>
    <p>{{ .Site.Params.bio }}</p>
    <div class="author-links">
      {{ with .Site.Params.social.github }}<a href="{{ . }}" target="_blank" rel="noopener noreferrer">GitHub</a>{{ end }}
      {{ with .Site.Params.social.linkedin }}<a href="{{ . }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>{{ end }}
      {{ with .Site.Params.social.twitter }}<a href="{{ . }}" target="_blank" rel="noopener noreferrer">Twitter/X</a>{{ end }}
    </div>
  </div>
</div>
