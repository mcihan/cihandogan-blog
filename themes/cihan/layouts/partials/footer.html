<footer class="footer" role="contentinfo">
    <div class="container">
        <div class="footer-links">
            <a href="mailto:{{ .Site.Params.email }}">Email</a>
            {{ with .Site.Params.social.linkedin }}<a href="{{ . }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>{{ end }}
            {{ with .Site.Params.social.github }}<a href="{{ . }}" target="_blank" rel="noopener noreferrer">GitHub</a>{{ end }}
            <a href="{{ "/blog/feed.xml" | relURL }}" aria-label="RSS Feed">RSS</a>
        </div>
        <p class="footer-copy">&copy; {{ now.Year }} {{ .Site.Params.author }}. All rights reserved.</p>
    </div>
</footer>
