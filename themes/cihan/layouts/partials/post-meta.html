<div class="post-meta">
  <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format .Site.Params.dateFormat }}</time>
  <span class="reading-time">{{ math.Round (div (countwords .Content) 200.0) }} min read</span>
  {{ with .Params.categories }}
  {{ range . }}
  <a href="{{ "/categories/" | relURL }}{{ . | urlize }}/" class="category">{{ . }}</a>
  {{ end }}
  {{ end }}
</div>
