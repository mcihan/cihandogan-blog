{{ define "main" }}
    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>{{ .Title }}</h1>
            <p>{{ .Description }}</p>
        </div>
    </section>

    <!-- Contact Info -->
    <section class="section" aria-labelledby="contact-title">
        <div class="container">
            <h2 id="contact-title" class="sr-only">Contact Information</h2>
            <div class="contact-grid">
                <div class="contact-item">
                    <span class="contact-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </span>
                    <div>
                        <div class="contact-label">Email</div>
                        <a href="mailto:{{ site.Params.email }}">{{ site.Params.email }}</a>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                    </span>
                    <div>
                        <div class="contact-label">LinkedIn</div>
                        <a href="{{ site.Params.social.linkedin }}" target="_blank" rel="noopener noreferrer">linkedin.com/in/cihan-dogan</a>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
                    </span>
                    <div>
                        <div class="contact-label">GitHub</div>
                        <a href="{{ site.Params.social.github }}" target="_blank" rel="noopener noreferrer">github.com/mcihan</a>
                    </div>
                </div>
                <div class="contact-item">
                    <span class="contact-icon" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
                    </span>
                    <div>
                        <div class="contact-label">Location</div>
                        <span>United Kingdom</span>
                    </div>
                </div>
            </div>
            <p class="contact-message">{{ .Params.message }}</p>
        </div>
    </section>
{{ end }}
