{{ define "main" }}
<section class="page-content">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <article class="post-card">
      <a href="{{ .RelPermalink }}">
        <h2>{{ .Title }}</h2>
      </a>
      {{ if .Date }}
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format $.Site.Params.dateFormat }}</time>
      </div>
      {{ end }}
      {{ if .Params.description }}
      <p class="excerpt">{{ .Params.description }}</p>
      {{ end }}
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
