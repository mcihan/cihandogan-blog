<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" data-theme="light">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  {{- partial "header.html" . -}}
  <main id="main-content">
    {{- block "main" . }}{{- end }}
  </main>
  {{- partial "footer.html" . -}}
  {{ $themeToggle := resources.Get "js/theme-toggle.js" | minify | fingerprint }}
  <script src="{{ $themeToggle.RelPermalink }}" defer></script>
</body>
</html>
