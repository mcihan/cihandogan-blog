{{ define "main" }}
    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>{{ .Title }}</h1>
            <p>{{ .Description }}</p>
        </div>
    </section>

    <!-- Articles List -->
    <section class="section" aria-labelledby="articles-title">
        <div class="container">
            <h2 id="articles-title" class="sr-only">All Articles</h2>
            <div class="articles-list">
                {{ range .Pages.ByDate.Reverse }}
                {{ partial "article-card.html" (dict "post" . "horizontal" true) }}
                {{ end }}
            </div>
        </div>
    </section>
{{ end }}
