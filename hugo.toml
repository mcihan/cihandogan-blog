baseURL = "https://cihandogan.co.uk/"
languageCode = "en-gb"
title = "Cihan Dogan"
theme = "cihan"
paginate = 10
enableRobotsTXT = true
enableEmoji = true
buildFuture = true

[markup]
  [markup.highlight]
    style = "onedark"
    lineNos = false
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  description = "Senior Software Engineer specializing in payment systems, fintech, and distributed backend architectures. 10+ years experience. Based in London, UK."
  author = "Cihan Dogan"
  tagline = "Senior Software Engineer | Payment Systems, Microservices, AI Integration"
  bio = "Senior Software Engineer with 10+ years of experience building scalable distributed systems across fintech, IoT, and gambling domains. Specializing in payment systems, wallet platforms, and high-throughput backend architectures using Java, Spring Boot, and microservices."
  avatar = "/images/profile.jpg"
  email = "hello@cihandogan.co.uk"
  location = "London, United Kingdom"
  dateFormat = "2 January 2006"

  [params.social]
    github = "https://github.com/mcihan"
    linkedin = "https://linkedin.com/in/cihan-dogan"

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Blog"
    url = "/blog/"
    weight = 2
  [[menus.main]]
    name = "Projects"
    url = "/projects/"
    weight = 3
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 4
  [[menus.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10
