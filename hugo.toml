baseURL = "https://cihandogan.co.uk/"
languageCode = "en-gb"
title = "Cihan Dogan"
theme = "cihan"
paginate = 10
enableRobotsTXT = true
enableEmoji = true

[markup]
  [markup.highlight]
    style = "onedark"
    lineNos = false
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[taxonomies]
  tag = "tags"
  category = "categories"

[params]
  description = "Personal blog of Cihan Dogan - Senior Software Engineer writing about Java, microservices, distributed systems, and cloud architecture."
  author = "Cihan Dogan"
  tagline = "Senior Software Engineer | Java, Spring, Microservices, AWS"
  bio = "Senior Software Engineer with 7+ years of experience building scalable distributed systems across fintech, IoT, and gambling domains. OCP certified Java developer passionate about event-driven architectures, cloud-native solutions, and writing clean, maintainable code."
  avatar = "/images/avatar.webp"
  dateFormat = "2 January 2006"

  [params.social]
    github = "https://github.com/mcihan"
    linkedin = "https://linkedin.com/in/cihan-dogan"
    portfolio = "https://mcihan.github.io"

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Blog"
    url = "/blog/"
    weight = 2
  [[menus.main]]
    name = "Projects"
    url = "/projects/"
    weight = 3
  [[menus.main]]
    name = "About"
    url = "/about/"
    weight = 4
  [[menus.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10
