<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixed Comprehensive Test 2 — Cihan</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #2563eb; }
  .question-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #2563eb; background: #eff6ff; }
  .option.selected { border-color: #2563eb; background: #dbeafe; }
  .check-btn {
    margin-top: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #1d4ed8; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #eff6ff;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #1e40af; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Mixed Comprehensive Test 2 — Cihan</h1>
    <div class="meta">
      <span>Student: Cihan</span>
      <span>Topic: Mixed (All Weakness Areas)</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "fill", "q": "She works for ___ university in Istanbul.", "a": ["a"], "explanation": "'University' starts with /juː/ — a consonant sound → 'a'.", "topic": "articles"}, {"type": "fill", "q": "I bought ___ MacBook last week.", "a": ["a"], "explanation": "'MacBook' starts with /m/ — consonant sound → 'a'.", "topic": "articles"}, {"type": "mc", "q": "I ___ to the UK three times.", "options": ["went", "have been", "was going", "had been"], "a": "have been", "explanation": "Present perfect for life experience up to now.", "topic": "tenses"}, {"type": "mc", "q": "While the team ___ the deployment, the server crashed.", "options": ["finished", "was finishing", "had finished", "finishes"], "a": "was finishing", "explanation": "Past continuous for an interrupted ongoing action.", "topic": "tenses"}, {"type": "mc", "q": "She ___ tea every morning.", "options": ["drink", "drinks", "drinking", "is drink"], "a": "drinks", "explanation": "3rd-person singular: add -s.", "topic": "subject_verb_agreement"}, {"type": "mc", "q": "He ___ understand what you mean.", "options": ["don't", "doesn't", "not", "aren't"], "a": "doesn't", "explanation": "Third-person negative present simple uses 'doesn't'.", "topic": "subject_verb_agreement"}, {"type": "fill", "q": "I'm good ___ playing chess.", "a": ["at"], "explanation": "'Good at + -ing'.", "topic": "prepositions"}, {"type": "fill", "q": "He is afraid ___ flying.", "a": ["of"], "explanation": "'Afraid of + noun/-ing'.", "topic": "prepositions"}, {"type": "correct", "q": "I bought three breads from the shop.", "a": ["I bought three loaves of bread from the shop.", "I bought three pieces of bread from the shop."], "explanation": "'Bread' is uncountable. Use a counter: 'loaves/slices/pieces of bread'.", "topic": "plurals"}, {"type": "correct", "q": "He gave me a good news.", "a": ["He gave me some good news.", "He gave me good news."], "explanation": "'News' is uncountable — no 'a' and no plural form.", "topic": "plurals"}, {"type": "correct", "q": "It is one of the North is heavy and one of the East This is also very heavy because they're mostly Kurdish people.", "a": ["The Northern accent is heavy, and the Eastern one is heavy too, because most speakers are Kurdish.", "The Northern accent is heavy. The Eastern accent is also heavy because most of the speakers are Kurdish."], "explanation": "Front-load the subject ('the Northern accent'). Replace 'and then' chaining with full stops.", "topic": "sentence_structure"}, {"type": "rewrite", "q": "Combine using 'since' (cause): 'Hotels are cheap. There is huge competition.'", "a": ["Hotels are cheap since there is huge competition.", "Since there is huge competition, hotels are cheap."], "explanation": "'Since' = 'because' when introducing a reason.", "topic": "sentence_structure"}, {"type": "correct", "q": "I'm not sure why is he angry.", "a": ["I'm not sure why he is angry."], "explanation": "Embedded question: subject + verb, no inversion.", "topic": "word_order"}, {"type": "correct", "q": "Do you know how much costs it?", "a": ["Do you know how much it costs?"], "explanation": "Embedded question: 'how much it costs' (no inversion).", "topic": "word_order"}, {"type": "correct", "q": "What time the meeting starts?", "a": ["What time does the meeting start?"], "explanation": "Add auxiliary 'does' before subject.", "topic": "question_formation"}, {"type": "correct", "q": "Why he go back to his hometown?", "a": ["Why does he go back to his hometown?", "Why did he go back to his hometown?"], "explanation": "Add auxiliary; choose tense based on context.", "topic": "question_formation"}, {"type": "mc", "q": "___ I borrow your charger?", "options": ["May", "Should", "Would", "Need"], "a": "May", "explanation": "'May/can/could I…' for asking permission.", "topic": "modal_verbs"}, {"type": "correct", "q": "You should to call him.", "a": ["You should call him."], "explanation": "After modal verbs use the base form, no 'to'.", "topic": "modal_verbs"}, {"type": "mc", "q": "I stopped ___ a break.", "options": ["take", "to take", "taking", "took"], "a": "to take", "explanation": "'Stop to do' = stop in order to do something.", "topic": "gerunds_infinitives"}, {"type": "mc", "q": "I stopped ___ coffee last year.", "options": ["drink", "to drink", "drinking", "drank"], "a": "drinking", "explanation": "'Stop doing' = quit the activity.", "topic": "gerunds_infinitives"}, {"type": "mc", "q": "If I had studied medicine, I ___ a doctor now.", "options": ["will be", "would be", "would have been", "am"], "a": "would be", "explanation": "Mixed conditional: past condition (had studied) + present result (would be).", "topic": "conditionals"}, {"type": "mc", "q": "If you ___ to me, you wouldn't be in this mess.", "options": ["listened", "had listened", "listen", "would listen"], "a": "had listened", "explanation": "Mixed conditional: past condition (had listened) + present result (wouldn't be).", "topic": "conditionals"}, {"type": "mc", "q": "The window ___ broken last night.", "options": ["is", "was", "has", "were"], "a": "was", "explanation": "Past simple passive (singular subject) → 'was'.", "topic": "passive_voice"}, {"type": "mc", "q": "This building ___ in 1850.", "options": ["built", "was built", "has built", "builds"], "a": "was built", "explanation": "Past simple passive: was/were + past participle.", "topic": "passive_voice"}, {"type": "correct", "q": "Even we understand it, we can't apply it.", "a": ["Even though we understand it, we can't apply it."], "explanation": "For a true concession use 'even though'.", "topic": "connectors"}];
const SHOW_TOPIC_PILL = true;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
