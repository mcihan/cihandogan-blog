<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Word Order — Personalised Exercise for Cihan</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #2563eb; }
  .question-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #2563eb; background: #eff6ff; }
  .option.selected { border-color: #2563eb; background: #dbeafe; }
  .check-btn {
    margin-top: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #1d4ed8; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #eff6ff;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #1e40af; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Word Order — Personalised Exercise for Cihan</h1>
    <div class="meta">
      <span>Student: Cihan</span>
      <span>Topic: Word Order</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "correct", "q": "I don't know where are you from.", "a": ["I don't know where you are from."], "explanation": "Embedded questions take statement word order (subject + verb)."}, {"type": "correct", "q": "They are asking where are you from.", "a": ["They are asking where you are from."], "explanation": "Embedded question: drop the inversion."}, {"type": "correct", "q": "Could you tell me what time is it?", "a": ["Could you tell me what time it is?"], "explanation": "Indirect question: subject before verb."}, {"type": "correct", "q": "I write a code generally.", "a": ["Generally, I write code.", "I generally write code."], "explanation": "Frequency/manner adverbs go before the main verb or at the start of the sentence."}, {"type": "correct", "q": "I test always my changes.", "a": ["I always test my changes."], "explanation": "Frequency adverb ('always') goes between subject and main verb."}, {"type": "mc", "q": "Choose the correct order:", "options": ["I usually go to the gym after work.", "I go usually to the gym after work.", "I go to the gym usually after work.", "Usually I go to gym after work."], "a": "I usually go to the gym after work.", "explanation": "Frequency adverb between subject and main verb; 'the gym' takes 'the'."}, {"type": "correct", "q": "He speaks English very well always.", "a": ["He always speaks English very well."], "explanation": "'Always' goes before the main verb."}, {"type": "correct", "q": "Tomorrow morning I have an early meeting at 8 am.", "a": ["Tomorrow morning I have an early meeting at 8 am.", "I have an early meeting at 8 am tomorrow morning."], "explanation": "Both are fine; English allows time expressions at the start or end."}, {"type": "correct", "q": "I'm not sure why is he angry.", "a": ["I'm not sure why he is angry."], "explanation": "Embedded question: subject + verb, no inversion."}, {"type": "correct", "q": "Do you know how much costs it?", "a": ["Do you know how much it costs?"], "explanation": "Embedded question: 'how much it costs' (no inversion)."}, {"type": "mc", "q": "Choose the correct order:", "options": ["She speaks fluently English.", "She speaks English fluently.", "Fluently she English speaks.", "She fluently English speaks."], "a": "She speaks English fluently.", "explanation": "Adverb of manner after the object: verb + object + adverb."}, {"type": "correct", "q": "I want to know when will the meeting start.", "a": ["I want to know when the meeting will start."], "explanation": "Indirect question — keep subject + verb."}, {"type": "correct", "q": "Tell me please what time is the meeting.", "a": ["Please tell me what time the meeting is."], "explanation": "'Please' fronts the sentence; indirect question word order."}, {"type": "correct", "q": "I quickly went to the kitchen.", "a": ["I went quickly to the kitchen.", "I quickly went to the kitchen."], "explanation": "Both are acceptable; 'quickly' can go before or after the main verb."}, {"type": "mc", "q": "Choose the correct sentence:", "options": ["I never have been to Japan.", "I have never been to Japan.", "I have been never to Japan.", "Never I have been to Japan."], "a": "I have never been to Japan.", "explanation": "In perfect tenses the adverb goes between auxiliary and main verb."}, {"type": "correct", "q": "I'm wondering where can I find the report.", "a": ["I'm wondering where I can find the report."], "explanation": "Embedded question: subject + verb."}, {"type": "correct", "q": "Generally I write a code with tests.", "a": ["Generally, I write code with tests.", "I generally write code with tests."], "explanation": "'Generally' fronts the clause or sits before the main verb; drop 'a' before uncountable 'code' here."}, {"type": "correct", "q": "He has a Japanese small interesting collection.", "a": ["He has an interesting small Japanese collection."], "explanation": "Adjective order: opinion, size, age, shape, colour, origin, material, purpose."}, {"type": "mc", "q": "Choose the correct adjective order:", "options": ["a big red Italian car", "a red big Italian car", "an Italian big red car", "a big Italian red car"], "a": "a big red Italian car", "explanation": "Order: size → colour → origin."}, {"type": "correct", "q": "Hardly I had finished when the phone rang.", "a": ["Hardly had I finished when the phone rang."], "explanation": "After 'hardly' at the start, inversion is required (C1 structure)."}, {"type": "correct", "q": "Never I have seen such a mess.", "a": ["Never have I seen such a mess."], "explanation": "With negative adverbs at the start, invert subject and auxiliary."}, {"type": "correct", "q": "Yesterday at 8 pm I was eating dinner.", "a": ["At 8 pm yesterday I was eating dinner.", "Yesterday at 8 pm I was eating dinner."], "explanation": "Both orders are fine; specific time usually before day reference."}, {"type": "correct", "q": "I'm not sure if will he come.", "a": ["I'm not sure if he will come."], "explanation": "Indirect question: subject before auxiliary."}, {"type": "correct", "q": "Could you tell me where is the toilet?", "a": ["Could you tell me where the toilet is?"], "explanation": "Indirect question: subject + verb."}, {"type": "correct", "q": "I want to ask why did you leave.", "a": ["I want to ask why you left."], "explanation": "Indirect question: no auxiliary inversion; use past simple, not 'did + base'."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
