<!DOCTYPE html>

<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixed Comprehensive Test 3 — Cihan</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #2563eb; }
  .question-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #2563eb; background: #eff6ff; }
  .option.selected { border-color: #2563eb; background: #dbeafe; }
  .check-btn {
    margin-top: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #1d4ed8; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #eff6ff;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #1e40af; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Mixed Comprehensive Test 3 — Cihan</h1>
    <div class="meta">
      <span>Student: Cihan</span>
      <span>Topic: Mixed (All Weakness Areas)</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "fill", "q": "We discussed ___ secularism in the lesson.", "a": ["-", "x", "no article", ""], "explanation": "Abstract concepts in general take zero article.", "topic": "articles"}, {"type": "fill", "q": "He is ___ best engineer in our team.", "a": ["the"], "explanation": "Superlatives always take 'the'.", "topic": "articles"}, {"type": "mc", "q": "She ___ English for five years before she moved abroad.", "options": ["studied", "had studied", "was studying", "has studied"], "a": "had studied", "explanation": "Past perfect for an action completed before another past action.", "topic": "tenses"}, {"type": "mc", "q": "At 9 pm tomorrow, I ___ dinner with my family.", "options": ["have", "will have", "will be having", "am having"], "a": "will be having", "explanation": "Future continuous for an action in progress at a specific future time.", "topic": "tenses"}, {"type": "correct", "q": "Neither of them know the answer.", "a": ["Neither of them knows the answer."], "explanation": "'Neither' is singular in formal English → 'knows'.", "topic": "subject_verb_agreement"}, {"type": "correct", "q": "There is many reasons to learn English.", "a": ["There are many reasons to learn English."], "explanation": "With plural subjects, use 'are', not 'is'.", "topic": "subject_verb_agreement"}, {"type": "fill", "q": "Thank you ___ your help.", "a": ["for"], "explanation": "'Thank you for + noun/-ing'.", "topic": "prepositions"}, {"type": "fill", "q": "I'll see you ___ Monday.", "a": ["on"], "explanation": "Days take 'on': on Monday, on weekends.", "topic": "prepositions"}, {"type": "mc", "q": "My ___ are new this season.", "options": ["clothing", "clothes", "cloths", "cloth"], "a": "clothes", "explanation": "'Clothes' is plural-only. 'Clothing' is uncountable; 'cloth' is a material.", "topic": "plurals"}, {"type": "correct", "q": "I have a lot of homeworks tonight.", "a": ["I have a lot of homework tonight."], "explanation": "'Homework' is uncountable.", "topic": "plurals"}, {"type": "rewrite", "q": "Combine using 'after': 'I finished the deployment. I closed my laptop.'", "a": ["After I finished the deployment, I closed my laptop.", "After finishing the deployment, I closed my laptop."], "explanation": "'After + clause' or 'after + -ing'.", "topic": "sentence_structure"}, {"type": "rewrite", "q": "Combine using 'before': 'I review the code. I deploy it.'", "a": ["I review the code before I deploy it.", "Before deploying it, I review the code."], "explanation": "'Before + clause' or 'before + -ing'.", "topic": "sentence_structure"}, {"type": "correct", "q": "Generally I write a code with tests.", "a": ["Generally, I write code with tests.", "I generally write code with tests."], "explanation": "'Generally' fronts the clause or sits before the main verb; drop 'a' before uncountable 'code' here.", "topic": "word_order"}, {"type": "correct", "q": "He has a Japanese small interesting collection.", "a": ["He has an interesting small Japanese collection."], "explanation": "Adjective order: opinion, size, age, shape, colour, origin, material, purpose.", "topic": "word_order"}, {"type": "rewrite", "q": "Make a subject question: 'JOHN broke the window.'", "a": ["Who broke the window?"], "explanation": "When the question word is the subject, no auxiliary inversion: 'Who + verb'.", "topic": "question_formation"}, {"type": "rewrite", "q": "Make a question for: 'They have lived here for ten years.'", "a": ["How long have they lived here?"], "explanation": "Present perfect duration question: how long + have + subject + past participle.", "topic": "question_formation"}, {"type": "mc", "q": "It ___ rain later — take an umbrella.", "options": ["might", "must", "ought", "should"], "a": "might", "explanation": "'Might' = future possibility.", "topic": "modal_verbs"}, {"type": "mc", "q": "You ___ have told me earlier — I would have helped.", "options": ["could", "must", "can", "need"], "a": "could", "explanation": "'Could have + pp' = past possibility / mild reproach.", "topic": "modal_verbs"}, {"type": "mc", "q": "Would you mind ___ the door?", "options": ["close", "to close", "closing", "closed"], "a": "closing", "explanation": "'Mind + -ing'.", "topic": "gerunds_infinitives"}, {"type": "mc", "q": "I refuse ___ that document.", "options": ["sign", "to sign", "signing", "signed"], "a": "to sign", "explanation": "'Refuse' takes 'to + base'.", "topic": "gerunds_infinitives"}, {"type": "mc", "q": "I wish I ___ more languages.", "options": ["speak", "spoke", "had spoken", "would speak"], "a": "spoke", "explanation": "'I wish + past simple' for unreal present wish.", "topic": "conditionals"}, {"type": "mc", "q": "I wish I ___ harder at school.", "options": ["studied", "had studied", "would study", "study"], "a": "had studied", "explanation": "'I wish + past perfect' for regret about the past.", "topic": "conditionals"}, {"type": "rewrite", "q": "Convert to get-passive: 'My car was fixed yesterday.'", "a": ["My car got fixed yesterday."], "explanation": "Informal/spoken passive uses 'get + past participle'.", "topic": "passive_voice"}, {"type": "mc", "q": "This problem ___ by the team tomorrow.", "options": ["will solve", "will be solving", "will be solved", "is solved"], "a": "will be solved", "explanation": "Future passive: will be + past participle.", "topic": "passive_voice"}, {"type": "mc", "q": "He didn't study. ___ , he failed.", "options": ["As a result", "Whereas", "Moreover", "Although"], "a": "As a result", "explanation": "'As a result' = consequence.", "topic": "connectors"}];
const SHOW_TOPIC_PILL = true;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
