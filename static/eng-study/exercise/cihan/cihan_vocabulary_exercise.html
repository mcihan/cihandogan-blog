<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vocabulary &amp; Collocations — Personalised Exercise for Cihan</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #2563eb; }
  .question-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #2563eb; background: #eff6ff; }
  .option.selected { border-color: #2563eb; background: #dbeafe; }
  .check-btn {
    margin-top: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #1d4ed8; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #eff6ff;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #1e40af; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Vocabulary &amp; Collocations — Personalised Exercise for Cihan</h1>
    <div class="meta">
      <span>Student: Cihan</span>
      <span>Topic: Vocabulary &amp; Collocations</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "correct", "q": "He always give a decision quickly.", "a": ["He always makes decisions quickly.", "He always makes a decision quickly."], "explanation": "Collocation: 'make a decision' (Turkish 'karar vermek' translates literally to 'give a decision' — wrong in English)."}, {"type": "correct", "q": "We will do a party for her birthday.", "a": ["We will throw a party for her birthday.", "We will have a party for her birthday."], "explanation": "Collocation: 'throw/have a party'."}, {"type": "correct", "q": "I make sport three times a week.", "a": ["I do sport three times a week.", "I play sport three times a week."], "explanation": "Collocation: 'do/play sport' (never 'make')."}, {"type": "correct", "q": "He wants to open a business in Istanbul.", "a": ["He wants to start a business in Istanbul.", "He wants to set up a business in Istanbul."], "explanation": "Collocation: 'start/set up a business'."}, {"type": "correct", "q": "Generally I am scaring of flying.", "a": ["Generally I am scared of flying."], "explanation": "'Scared' = how you feel; 'scary' = causes fear. Use '-ed' for feelings."}, {"type": "correct", "q": "My presentation was very boring of me.", "a": ["My presentation was very boring.", "I was very bored during my presentation."], "explanation": "'-ing' describes the thing; '-ed' describes the person."}, {"type": "mc", "q": "Replace 'good' with a stronger word: 'The presentation was good.'", "options": ["effective", "easy", "fast", "random"], "a": "effective", "explanation": "'Effective' is a stronger, more precise alternative."}, {"type": "mc", "q": "Replace 'a lot of': 'There were a lot of people at the conference.'", "options": ["plenty of", "a number", "big", "small"], "a": "plenty of", "explanation": "'Plenty of' or 'numerous' is a B2/C1 alternative."}, {"type": "mc", "q": "Replace 'thing': 'The most important thing is to plan ahead.'", "options": ["aspect", "stuff", "place", "time"], "a": "aspect", "explanation": "'Aspect/factor/point' are more precise than 'thing'."}, {"type": "mc", "q": "Replace 'because of that' with a formal connector:", "options": ["consequently", "however", "whereas", "moreover"], "a": "consequently", "explanation": "'Consequently' = formal equivalent of 'because of that'."}, {"type": "correct", "q": "I had a lot of stuffs to do this week.", "a": ["I had a lot of stuff to do this week."], "explanation": "'Stuff' is uncountable, no plural."}, {"type": "correct", "q": "Yesterday I gave a presentation. I was very nervous because of that.", "a": ["Yesterday I gave a presentation. As a result, I was very nervous.", "Yesterday I gave a presentation; that's why I was very nervous."], "explanation": "Replace 'because of that' with 'as a result' or 'that's why' for variety."}, {"type": "mc", "q": "Which word means 'happening before something else expected'?", "options": ["previously", "mandatory", "exceptional", "conventional"], "a": "previously", "explanation": "'Previously' = before now or before another time mentioned."}, {"type": "correct", "q": "It is more harder than I expected.", "a": ["It is harder than I expected.", "It is much harder than I expected."], "explanation": "Don't double comparatives. Use 'much harder' for emphasis."}, {"type": "correct", "q": "He told to me about it yesterday.", "a": ["He told me about it yesterday.", "He said to me yesterday that he knew about it."], "explanation": "'Tell + somebody' (no 'to'); 'say + to + somebody'."}, {"type": "mc", "q": "Choose the correct collocation: 'He ___ a decision to leave the company.'", "options": ["gave", "made", "did", "took"], "a": "made", "explanation": "'Make a decision' is the standard collocation."}, {"type": "mc", "q": "Choose the correct collocation: 'I want to ___ a chance and apply for the job.'", "options": ["give", "make", "take", "do"], "a": "take", "explanation": "'Take a chance' / 'take a risk' — fixed collocations."}, {"type": "mc", "q": "Choose the correct collocation: 'You should ___ care of yourself.'", "options": ["take", "make", "give", "do"], "a": "take", "explanation": "'Take care of' is fixed."}, {"type": "mc", "q": "Choose the formal replacement for 'a lot':", "options": ["lots", "plenty", "considerable", "big"], "a": "considerable", "explanation": "'Considerable' is the formal/quantitative equivalent."}, {"type": "mc", "q": "Choose the closest meaning to 'mandatory':", "options": ["optional", "required", "useful", "extra"], "a": "required", "explanation": "'Mandatory' = required by rule or law."}, {"type": "mc", "q": "Choose the closest meaning to 'deliberate':", "options": ["accidental", "intentional", "casual", "slow"], "a": "intentional", "explanation": "'Deliberate' = done on purpose."}, {"type": "correct", "q": "I am very interesting in AI.", "a": ["I am very interested in AI."], "explanation": "-ed for feelings; AI is interesting → I am interested."}, {"type": "mc", "q": "Choose the formal hedge: 'I think AI ___ change everything.'", "options": ["definitely", "tends to", "is going", "absolutely"], "a": "tends to", "explanation": "'Tends to + base' is a softer, more formal claim."}, {"type": "mc", "q": "Choose a precise verb: 'Can you ___ this task by Friday?'", "options": ["do", "handle", "make", "take"], "a": "handle", "explanation": "'Handle a task/situation' is more specific than 'do'."}, {"type": "correct", "q": "In last week, we had a meeting in UK.", "a": ["Last week, we had a meeting in the UK."], "explanation": "Drop 'in' before 'last week'. Add 'the' before 'UK'."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
