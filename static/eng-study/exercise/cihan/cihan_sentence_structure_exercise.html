<!DOCTYPE html>

<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sentence Structure &amp; Subordination — Personalised Exercise for Cihan</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #2563eb; }
  .question-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #2563eb; background: #eff6ff; }
  .option.selected { border-color: #2563eb; background: #dbeafe; }
  .check-btn {
    margin-top: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #1d4ed8; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #eff6ff;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #1e40af; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Sentence Structure &amp; Subordination — Personalised Exercise for Cihan</h1>
    <div class="meta">
      <span>Student: Cihan</span>
      <span>Topic: Sentence Structure &amp; Subordination</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "rewrite", "q": "Rewrite as one clear sentence using a relative clause: 'There is a place. It is very touristic. Many hotels are there.'", "a": ["There is a very touristic place where many hotels are.", "There is a very touristic place that has many hotels.", "It is a very touristic place with many hotels."], "explanation": "Use a relative clause ('where/that') or a prepositional phrase to subordinate."}, {"type": "rewrite", "q": "Split into two sentences: 'We lived there for 15 years and then we were almost hating from Istanbul because a lot of things our life was very busy.'", "a": ["We lived there for 15 years. By the end, we were almost tired of Istanbul because life was very busy.", "We lived there for 15 years, and by the end we almost hated Istanbul because our life was so busy."], "explanation": "Break long chains. Replace 'and then … and then' with full stops. Use 'tired of' (not 'hating from')."}, {"type": "rewrite", "q": "Rewrite using 'although': 'It is very touristic. The hotels are still cheap.'", "a": ["Although it is very touristic, the hotels are still cheap."], "explanation": "'Although + clause, main clause' replaces simple 'but' for a concessive link."}, {"type": "rewrite", "q": "Rewrite using 'because of': 'There is a lot of competition. The hotels are cheap.'", "a": ["Because of the competition, the hotels are cheap.", "The hotels are cheap because of the competition."], "explanation": "'Because of + noun phrase' (not 'because' + clause)."}, {"type": "rewrite", "q": "Rewrite using a relative clause with 'who': 'I have a colleague. He works in Berlin.'", "a": ["I have a colleague who works in Berlin."], "explanation": "Use 'who' for people (not 'which')."}, {"type": "rewrite", "q": "Rewrite using a relative clause with 'which': 'I bought a laptop. It is very fast.'", "a": ["I bought a laptop which is very fast.", "I bought a laptop that is very fast."], "explanation": "Use 'which/that' for things."}, {"type": "rewrite", "q": "Rewrite using 'while': 'I was working on the report. My manager called.'", "a": ["While I was working on the report, my manager called."], "explanation": "'While + past continuous' for a background action."}, {"type": "rewrite", "q": "Rewrite as one sentence: 'I planned to go to the beach. The weather was bad. I stayed home.'", "a": ["I planned to go to the beach, but the weather was bad, so I stayed home.", "Although I planned to go to the beach, the weather was bad, so I stayed home."], "explanation": "Combine using 'but/so' or 'although' to create one well-formed complex sentence."}, {"type": "correct", "q": "It is one of the North is heavy and one of the East This is also very heavy because they're mostly Kurdish people.", "a": ["The Northern accent is heavy, and the Eastern one is heavy too, because most speakers are Kurdish.", "The Northern accent is heavy. The Eastern accent is also heavy because most of the speakers are Kurdish."], "explanation": "Front-load the subject ('the Northern accent'). Replace 'and then' chaining with full stops."}, {"type": "rewrite", "q": "Combine using 'since' (cause): 'Hotels are cheap. There is huge competition.'", "a": ["Hotels are cheap since there is huge competition.", "Since there is huge competition, hotels are cheap."], "explanation": "'Since' = 'because' when introducing a reason."}, {"type": "rewrite", "q": "Combine using 'even though': 'I was tired. I went to the gym.'", "a": ["Even though I was tired, I went to the gym."], "explanation": "'Even though + clause' for strong concession."}, {"type": "rewrite", "q": "Combine using 'despite': 'I was tired. I went to the gym.'", "a": ["Despite being tired, I went to the gym.", "Despite my tiredness, I went to the gym."], "explanation": "'Despite + noun/-ing' (not + clause)."}, {"type": "correct", "q": "He is arrested but on there was only one way he can rid of from to escape from to or I don't know.", "a": ["He was arrested, but there was only one way for him to escape.", "He was arrested, but the only way out was to escape."], "explanation": "Reduce circular phrasing. Use one clear verb ('escape')."}, {"type": "rewrite", "q": "Rewrite as a single, well-formed sentence: 'I went to the office. I had a meeting. After that, I went home.'", "a": ["I went to the office, had a meeting, and then went home.", "After my meeting at the office, I went home."], "explanation": "Avoid chaining 'and then … and then'. Combine into one balanced sentence."}, {"type": "rewrite", "q": "Use a relative clause: 'My laptop is slow. I bought it last year.'", "a": ["My laptop, which I bought last year, is slow."], "explanation": "Non-defining relative clause set off by commas."}, {"type": "rewrite", "q": "Rewrite using 'so that': 'I left early. I wanted to catch the train.'", "a": ["I left early so that I could catch the train."], "explanation": "'So that + clause' expresses purpose."}, {"type": "rewrite", "q": "Combine using 'after': 'I finished the deployment. I closed my laptop.'", "a": ["After I finished the deployment, I closed my laptop.", "After finishing the deployment, I closed my laptop."], "explanation": "'After + clause' or 'after + -ing'."}, {"type": "rewrite", "q": "Combine using 'before': 'I review the code. I deploy it.'", "a": ["I review the code before I deploy it.", "Before deploying it, I review the code."], "explanation": "'Before + clause' or 'before + -ing'."}, {"type": "rewrite", "q": "Rewrite into 3 sentences: 'I went to Istanbul and then I met my friend and then we went to a restaurant and then we ate kebab and then we went home.'", "a": ["I went to Istanbul. I met my friend, and we went to a restaurant. After dinner we went home."], "explanation": "Break 'and then' chains into shorter, planned sentences."}, {"type": "rewrite", "q": "Rewrite using a participle clause: 'He was sitting next to me. He started talking.'", "a": ["Sitting next to me, he started talking."], "explanation": "Reduced clause: drop 'he was', keep the -ing form."}, {"type": "correct", "q": "Because of this is very expensive.", "a": ["This is very expensive.", "It is very expensive because of this.", "Because of this, it is very expensive."], "explanation": "'Because of' takes a noun phrase, not a clause as its main verb."}, {"type": "rewrite", "q": "Combine using a relative clause: 'I have a friend. He lives in Germany. He is a doctor.'", "a": ["I have a friend who lives in Germany and is a doctor.", "I have a friend, a doctor, who lives in Germany."], "explanation": "Subordinate with 'who' instead of chaining sentences."}, {"type": "rewrite", "q": "Replace 'and then' with subordination: 'I was speaking and then he interrupted me.'", "a": ["He interrupted me while I was speaking."], "explanation": "Use 'while + past continuous' to subordinate the background action."}, {"type": "correct", "q": "Very touristic place by the way uh the anyone who go there is touristic.", "a": ["By the way, it is a very touristic place — anyone who goes there can tell.", "It is a very touristic place. Anyone who goes there can see it."], "explanation": "Plan the subject first. Use full stops and add 3rd-person -s ('goes')."}, {"type": "rewrite", "q": "Rewrite formally: 'and then because of that we decided to move'.", "a": ["As a result, we decided to move.", "Consequently, we decided to move."], "explanation": "Replace informal 'and then because of that' with a formal connector."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
