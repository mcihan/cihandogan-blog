<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plural Forms &amp; Countable/Uncountable — Personalised Exercise for Cihan</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #2563eb; }
  .question-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #2563eb; background: #eff6ff; }
  .option.selected { border-color: #2563eb; background: #dbeafe; }
  .check-btn {
    margin-top: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #1d4ed8; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #eff6ff;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #1e40af; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>

<body>
<div class="container">
  <header>
    <h1>Plural Forms &amp; Countable/Uncountable — Personalised Exercise for Cihan</h1>
    <div class="meta">
      <span>Student: Cihan</span>
      <span>Topic: Plural Forms &amp; Countable/Uncountable</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "correct", "q": "I brought my stuffs from home.", "a": ["I brought my stuff from home."], "explanation": "'Stuff' is uncountable — no plural form."}, {"type": "correct", "q": "She gave me some advices.", "a": ["She gave me some advice.", "She gave me a piece of advice."], "explanation": "'Advice' is uncountable. Use 'a piece of advice' for one item."}, {"type": "correct", "q": "I need more informations.", "a": ["I need more information."], "explanation": "'Information' is uncountable — no plural."}, {"type": "correct", "q": "The feedbacks were positive.", "a": ["The feedback was positive."], "explanation": "'Feedback' is uncountable."}, {"type": "correct", "q": "There's a two type of users.", "a": ["There are two types of users."], "explanation": "After numerals > 1 use plural noun and plural verb."}, {"type": "correct", "q": "Two thing is important for him.", "a": ["Two things are important for him."], "explanation": "Plural noun + plural verb."}, {"type": "correct", "q": "60% of the people is like that.", "a": ["60% of the people are like that."], "explanation": "'People' is plural — 'are', not 'is'."}, {"type": "correct", "q": "There were many childs in the park.", "a": ["There were many children in the park."], "explanation": "Irregular plural: child → children."}, {"type": "correct", "q": "I bought three breads from the shop.", "a": ["I bought three loaves of bread from the shop.", "I bought three pieces of bread from the shop."], "explanation": "'Bread' is uncountable. Use a counter: 'loaves/slices/pieces of bread'."}, {"type": "correct", "q": "He gave me a good news.", "a": ["He gave me some good news.", "He gave me good news."], "explanation": "'News' is uncountable — no 'a' and no plural form."}, {"type": "correct", "q": "My luggages are heavy.", "a": ["My luggage is heavy."], "explanation": "'Luggage' is uncountable."}, {"type": "correct", "q": "She has long hairs.", "a": ["She has long hair."], "explanation": "'Hair' is uncountable when referring to all hair on someone's head."}, {"type": "correct", "q": "The polices arrested him.", "a": ["The police arrested him."], "explanation": "'Police' is treated as a plural collective noun, no -s."}, {"type": "correct", "q": "I drank two waters at lunch.", "a": ["I drank two bottles of water at lunch.", "I drank two glasses of water at lunch."], "explanation": "'Water' is uncountable. Use a counter: bottles/glasses of water."}, {"type": "mc", "q": "There ___ many problems with this approach.", "options": ["is", "are", "was", "has"], "a": "are", "explanation": "Plural subject → 'are'."}, {"type": "mc", "q": "All the staff ___ been informed.", "options": ["has", "have", "is", "was"], "a": "have", "explanation": "'Staff' is treated as plural in most usage (collective)."}, {"type": "mc", "q": "My ___ are new this season.", "options": ["clothing", "clothes", "cloths", "cloth"], "a": "clothes", "explanation": "'Clothes' is plural-only. 'Clothing' is uncountable; 'cloth' is a material."}, {"type": "correct", "q": "I have a lot of homeworks tonight.", "a": ["I have a lot of homework tonight."], "explanation": "'Homework' is uncountable."}, {"type": "correct", "q": "He owns three businesss in Istanbul.", "a": ["He owns three businesses in Istanbul."], "explanation": "Plural of 'business' is 'businesses' (add -es)."}, {"type": "correct", "q": "There were a lot of mans at the conference.", "a": ["There were a lot of men at the conference."], "explanation": "Irregular plural: man → men."}, {"type": "correct", "q": "I lost two of my tooth.", "a": ["I lost two of my teeth."], "explanation": "Irregular plural: tooth → teeth."}, {"type": "correct", "q": "My foots hurt after the hike.", "a": ["My feet hurt after the hike."], "explanation": "Irregular plural: foot → feet."}, {"type": "correct", "q": "We need more equipments.", "a": ["We need more equipment."], "explanation": "'Equipment' is uncountable."}, {"type": "correct", "q": "There is many reasons.", "a": ["There are many reasons."], "explanation": "Plural noun → 'are'."}, {"type": "correct", "q": "He gave a presentations yesterday.", "a": ["He gave a presentation yesterday.", "He gave presentations yesterday."], "explanation": "'A' goes with a singular noun; for plural drop 'a'."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
