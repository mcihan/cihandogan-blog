<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixed Comprehensive Test 1 — Cihan</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #2563eb; }
  .question-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #2563eb; background: #eff6ff; }
  .option.selected { border-color: #2563eb; background: #dbeafe; }
  .check-btn {
    margin-top: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #1d4ed8; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #eff6ff;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #1e40af; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Mixed Comprehensive Test 1 — Cihan</h1>
    <div class="meta">
      <span>Student: Cihan</span>
      <span>Topic: Mixed (All Weakness Areas)</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "fill", "q": "One of them is ___ exceptional promise.", "a": ["an"], "explanation": "Use 'an' before a vowel sound. 'Exceptional' starts with /e/.", "topic": "articles"}, {"type": "fill", "q": "In ___ UK, they are using short codes for payments.", "a": ["the"], "explanation": "Country names with 'Kingdom/States/Republic' take 'the': the UK.", "topic": "articles"}, {"type": "mc", "q": "I ___ on the beach when suddenly I saw storm clouds.", "options": ["was relaxing", "relaxed", "had relaxed", "am relaxing"], "a": "was relaxing", "explanation": "Past continuous for the background action; past simple for the sudden event.", "topic": "tenses"}, {"type": "mc", "q": "Previously, they ___ it that way.", "options": ["are doing", "did", "were doing", "do"], "a": "did", "explanation": "Past simple for completed past habit ('used to' is also fine). 'In previously, they are doing' is a Turkish calque.", "topic": "tenses"}, {"type": "correct", "q": "He don't have it.", "a": ["He doesn't have it."], "explanation": "Third-person singular: don't → doesn't.", "topic": "subject_verb_agreement"}, {"type": "correct", "q": "He say I don't know.", "a": ["He says I don't know."], "explanation": "Third-person singular: say → says.", "topic": "subject_verb_agreement"}, {"type": "fill", "q": "Maybe nobody will listen ___ it.", "a": ["to"], "explanation": "'Listen' always takes 'to' before an object.", "topic": "prepositions"}, {"type": "fill", "q": "Please reply ___ me as soon as possible.", "a": ["to"], "explanation": "'Reply to someone' — always with 'to'.", "topic": "prepositions"}, {"type": "correct", "q": "I brought my stuffs from home.", "a": ["I brought my stuff from home."], "explanation": "'Stuff' is uncountable — no plural form.", "topic": "plurals"}, {"type": "correct", "q": "She gave me some advices.", "a": ["She gave me some advice.", "She gave me a piece of advice."], "explanation": "'Advice' is uncountable. Use 'a piece of advice' for one item.", "topic": "plurals"}, {"type": "rewrite", "q": "Rewrite as one clear sentence using a relative clause: 'There is a place. It is very touristic. Many hotels are there.'", "a": ["There is a very touristic place where many hotels are.", "There is a very touristic place that has many hotels.", "It is a very touristic place with many hotels."], "explanation": "Use a relative clause ('where/that') or a prepositional phrase to subordinate.", "topic": "sentence_structure"}, {"type": "rewrite", "q": "Split into two sentences: 'We lived there for 15 years and then we were almost hating from Istanbul because a lot of things our life was very busy.'", "a": ["We lived there for 15 years. By the end, we were almost tired of Istanbul because life was very busy.", "We lived there for 15 years, and by the end we almost hated Istanbul because our life was so busy."], "explanation": "Break long chains. Replace 'and then … and then' with full stops. Use 'tired of' (not 'hating from').", "topic": "sentence_structure"}, {"type": "correct", "q": "I don't know where are you from.", "a": ["I don't know where you are from."], "explanation": "Embedded questions take statement word order (subject + verb).", "topic": "word_order"}, {"type": "correct", "q": "They are asking where are you from.", "a": ["They are asking where you are from."], "explanation": "Embedded question: drop the inversion.", "topic": "word_order"}, {"type": "rewrite", "q": "Form a question for: 'He works in Istanbul.'", "a": ["Where does he work?"], "explanation": "Question word + auxiliary (does) + subject + base verb.", "topic": "question_formation"}, {"type": "rewrite", "q": "Form a yes/no question: 'She has finished the report.'", "a": ["Has she finished the report?"], "explanation": "Invert auxiliary 'has' and subject.", "topic": "question_formation"}, {"type": "correct", "q": "I can be able to finish it today.", "a": ["I can finish it today.", "I am able to finish it today."], "explanation": "Don't double modals: 'can' or 'be able to', not both.", "topic": "modal_verbs"}, {"type": "mc", "q": "You ___ smoke here — it's a hospital.", "options": ["mustn't", "don't have to", "shouldn't have", "needn't"], "a": "mustn't", "explanation": "'Mustn't' = prohibition; 'don't have to' = no obligation.", "topic": "modal_verbs"}, {"type": "mc", "q": "I enjoy ___ to music.", "options": ["listen", "to listen", "listening", "listened"], "a": "listening", "explanation": "After 'enjoy' use a gerund (-ing).", "topic": "gerunds_infinitives"}, {"type": "mc", "q": "I want ___ home early today.", "options": ["go", "to go", "going", "gone"], "a": "to go", "explanation": "After 'want' use 'to + base'.", "topic": "gerunds_infinitives"}, {"type": "mc", "q": "If it rains tomorrow, we ___ the meeting indoors.", "options": ["have", "will have", "would have", "had"], "a": "will have", "explanation": "First conditional: if + present simple, will + base.", "topic": "conditionals"}, {"type": "mc", "q": "If I ___ more time, I would learn another language.", "options": ["have", "had", "would have", "will have"], "a": "had", "explanation": "Second conditional: if + past simple, would + base.", "topic": "conditionals"}, {"type": "rewrite", "q": "Make passive: 'They make decisions every week.'", "a": ["Decisions are made every week.", "Decisions are made by them every week."], "explanation": "Present simple passive: am/is/are + past participle.", "topic": "passive_voice"}, {"type": "rewrite", "q": "Make passive: 'The team finished the project yesterday.'", "a": ["The project was finished yesterday.", "The project was finished by the team yesterday."], "explanation": "Past simple passive: was/were + past participle.", "topic": "passive_voice"}, {"type": "mc", "q": "It was cold. ___ , we went out for a walk.", "options": ["However", "Therefore", "Moreover", "Whereas"], "a": "However", "explanation": "'However' = contrast (but).", "topic": "connectors"}];
const SHOW_TOPIC_PILL = true;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
