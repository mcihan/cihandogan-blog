<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gerunds vs Infinitives — Personalised Exercise for Cihan</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #f6f9fc 0%, #eef2f7 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #2563eb; }
  .question-card {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2563eb; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #2563eb; background: #eff6ff; }
  .option.selected { border-color: #2563eb; background: #dbeafe; }
  .check-btn {
    margin-top: 12px;
    background: #2563eb;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #1d4ed8; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #eff6ff;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #1e40af; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #e0e7ff;
    color: #3730a3;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Gerunds vs Infinitives — Personalised Exercise for Cihan</h1>
    <div class="meta">
      <span>Student: Cihan</span>
      <span>Topic: Gerunds vs Infinitives</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "mc", "q": "I enjoy ___ to music.", "options": ["listen", "to listen", "listening", "listened"], "a": "listening", "explanation": "After 'enjoy' use a gerund (-ing)."}, {"type": "mc", "q": "I want ___ home early today.", "options": ["go", "to go", "going", "gone"], "a": "to go", "explanation": "After 'want' use 'to + base'."}, {"type": "mc", "q": "I'm interested in ___ a new language.", "options": ["learn", "to learn", "learning", "learnt"], "a": "learning", "explanation": "After a preposition use a gerund."}, {"type": "mc", "q": "I look forward to ___ you next week.", "options": ["see", "seeing", "to see", "saw"], "a": "seeing", "explanation": "'Look forward to' — 'to' is a preposition → -ing."}, {"type": "mc", "q": "He decided ___ the offer.", "options": ["accept", "to accept", "accepting", "accepted"], "a": "to accept", "explanation": "'Decide' takes 'to + base'."}, {"type": "mc", "q": "I avoid ___ coffee after 5 pm.", "options": ["drink", "to drink", "drinking", "drank"], "a": "drinking", "explanation": "'Avoid' takes a gerund."}, {"type": "mc", "q": "She suggested ___ a cab.", "options": ["take", "to take", "taking", "took"], "a": "taking", "explanation": "'Suggest' takes a gerund."}, {"type": "mc", "q": "I forgot ___ the door.", "options": ["lock", "to lock", "locking", "locked"], "a": "to lock", "explanation": "'Forgot to lock' = I didn't lock it. ('Forgot locking' = I have no memory of locking it.)"}, {"type": "mc", "q": "I stopped ___ a break.", "options": ["take", "to take", "taking", "took"], "a": "to take", "explanation": "'Stop to do' = stop in order to do something."}, {"type": "mc", "q": "I stopped ___ coffee last year.", "options": ["drink", "to drink", "drinking", "drank"], "a": "drinking", "explanation": "'Stop doing' = quit the activity."}, {"type": "correct", "q": "We are using rather than though.", "a": ["We are using it rather than the other one.", "We use this rather than that."], "explanation": "After 'rather than' use -ing or the bare verb. 'Rather than though' is not a phrase."}, {"type": "mc", "q": "It's not worth ___ about it.", "options": ["worry", "to worry", "worrying", "worried"], "a": "worrying", "explanation": "'Worth + -ing'."}, {"type": "mc", "q": "I'm used to ___ early.", "options": ["wake up", "to wake up", "waking up", "woke up"], "a": "waking up", "explanation": "'Used to + -ing' = accustomed to. (Different from 'used to + base' = past habit.)"}, {"type": "mc", "q": "He promised ___ on time.", "options": ["arrive", "to arrive", "arriving", "arrived"], "a": "to arrive", "explanation": "'Promise' takes 'to + base'."}, {"type": "mc", "q": "I miss ___ in Istanbul.", "options": ["live", "to live", "living", "lived"], "a": "living", "explanation": "'Miss + -ing' = miss the activity."}, {"type": "mc", "q": "He admitted ___ the mistake.", "options": ["make", "to make", "making", "made"], "a": "making", "explanation": "'Admit' takes -ing."}, {"type": "mc", "q": "Would you mind ___ the door?", "options": ["close", "to close", "closing", "closed"], "a": "closing", "explanation": "'Mind + -ing'."}, {"type": "mc", "q": "I refuse ___ that document.", "options": ["sign", "to sign", "signing", "signed"], "a": "to sign", "explanation": "'Refuse' takes 'to + base'."}, {"type": "mc", "q": "They kept ___ the same question.", "options": ["ask", "to ask", "asking", "asked"], "a": "asking", "explanation": "'Keep + -ing' = continue doing."}, {"type": "mc", "q": "I'd like ___ a question.", "options": ["ask", "to ask", "asking", "asked"], "a": "to ask", "explanation": "'Would like + to + base'."}, {"type": "mc", "q": "He is good at ___ chess.", "options": ["play", "to play", "playing", "played"], "a": "playing", "explanation": "After a preposition ('at') use -ing."}, {"type": "mc", "q": "It's no use ___ now.", "options": ["complain", "to complain", "complaining", "complained"], "a": "complaining", "explanation": "'It's no use + -ing'."}, {"type": "mc", "q": "I learned ___ when I was 18.", "options": ["drive", "to drive", "driving", "drove"], "a": "to drive", "explanation": "'Learn + to + base'."}, {"type": "mc", "q": "She started ___ piano at age six.", "options": ["play", "to play", "playing", "plays"], "a": "playing", "explanation": "'Start' takes either form; 'playing' is the more natural choice here."}, {"type": "correct", "q": "I'm looking forward to see you soon.", "a": ["I'm looking forward to seeing you soon."], "explanation": "'Looking forward to' — 'to' is a preposition, so use -ing."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
