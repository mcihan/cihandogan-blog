<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verb Tenses — Personalised Exercise for Deniz</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #fdf6f9 0%, #f3eaf2 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #be185d; }
  .question-card {
    background: #fafafa;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #be185d; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #be185d; background: #fdf2f8; }
  .option.selected { border-color: #be185d; background: #fce7f3; }
  .check-btn {
    margin-top: 12px;
    background: #be185d;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #9d174d; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #fdf2f8;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #9d174d; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #fce7f3;
    color: #9d174d;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Verb Tenses — Personalised Exercise for Deniz</h1>
    <div class="meta">
      <span>Student: Deniz</span>
      <span>Topic: Verb Tenses</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "correct", "q": "I look at my past. I look at which I worked before. I look at the companies which I worked before, and they are still working.", "a": ["I look back at my past. I think about the companies where I worked before, and they are still operating."], "explanation": "Use 'where I worked' (relative adverb), and 'still operating' (present continuous for current ongoing state)."}, {"type": "mc", "q": "I ___ to that company for five years before I moved abroad.", "options": ["worked", "had worked", "was working", "have worked"], "a": "had worked", "explanation": "Past perfect for a completed duration before another past action."}, {"type": "mc", "q": "I ___ to Worthing several times.", "options": ["went", "have been", "was going", "had been"], "a": "have been", "explanation": "Present perfect for life experience up to now."}, {"type": "mc", "q": "I ___ podcasts every morning while I cook.", "options": ["listen to", "am listening to", "listened to", "have listened to"], "a": "listen to", "explanation": "Present simple for habitual actions. (Note: 'listen' needs 'to'.)"}, {"type": "correct", "q": "I actively listen podcast when I am cooking.", "a": ["I actively listen to podcasts when I am cooking."], "explanation": "'Listen + to + object'. 'Podcast' is countable → plural for general habit."}, {"type": "mc", "q": "Yesterday I ___ for an hour when my phone rang.", "options": ["cooked", "was cooking", "had cooked", "cook"], "a": "was cooking", "explanation": "Past continuous for the longer background action interrupted by another."}, {"type": "mc", "q": "By the time we arrived, the meeting ___ .", "options": ["already started", "had already started", "was already starting", "starts"], "a": "had already started", "explanation": "Past perfect: an action completed before another past event."}, {"type": "mc", "q": "I ___ in this house since 2018.", "options": ["live", "am living", "have lived", "lived"], "a": "have lived", "explanation": "Present perfect for a state continuing from past to now."}, {"type": "mc", "q": "We ___ snorkelling in Palawan last summer — it was spectacular.", "options": ["went", "were going", "have gone", "had gone"], "a": "went", "explanation": "Past simple for a completed past event with a specific time."}, {"type": "mc", "q": "At 6 pm tomorrow, I ___ dinner with my mother.", "options": ["have", "will have", "am having", "will be having"], "a": "will be having", "explanation": "Future continuous for an action in progress at a specific future time."}, {"type": "mc", "q": "By next year, we ___ here for ten years.", "options": ["live", "will live", "will have lived", "have lived"], "a": "will have lived", "explanation": "Future perfect for completed duration by a future point."}, {"type": "mc", "q": "I bought my Mazda last month — the mileage ___ very low.", "options": ["was", "has been", "is", "were"], "a": "was", "explanation": "Past simple — the buying happened in the past with a fixed time ('last month')."}, {"type": "correct", "q": "When I was a child, I am going to the beach every summer.", "a": ["When I was a child, I went to the beach every summer.", "When I was a child, I used to go to the beach every summer."], "explanation": "Past simple or 'used to' for past habits — not present continuous."}, {"type": "mc", "q": "I'm tired because I ___ all morning.", "options": ["worked", "was working", "have been working", "work"], "a": "have been working", "explanation": "Present perfect continuous explains a present state from a recent ongoing action."}, {"type": "correct", "q": "Another shirt is light blue or grey, which is really look good, looks good on them.", "a": ["Another shirt is light blue or grey, which really looks good on them."], "explanation": "Don't drift between 'look', 'looks', 'looking'. Hold the form for the whole clause: 'looks'."}, {"type": "mc", "q": "While the team ___ the deployment, the server crashed.", "options": ["finished", "was finishing", "had finished", "finishes"], "a": "was finishing", "explanation": "Past continuous for an action in progress when another happened."}, {"type": "mc", "q": "She ___ this car for two years before selling it.", "options": ["drove", "had driven", "was driving", "has driven"], "a": "had driven", "explanation": "Past perfect for a completed duration before another past event."}, {"type": "correct", "q": "In last year, we made a lot of plans.", "a": ["Last year, we made a lot of plans."], "explanation": "Drop 'in' before 'last year'. (Same for 'last week', 'last month'.)"}, {"type": "mc", "q": "I ___ Italian food more than any other cuisine.", "options": ["am liking", "like", "have liked", "was liking"], "a": "like", "explanation": "Stative verbs (like, love, prefer) take present simple, not continuous."}, {"type": "mc", "q": "Look! It ___ outside.", "options": ["rains", "is raining", "rained", "has rained"], "a": "is raining", "explanation": "Present continuous for an action happening right now."}, {"type": "mc", "q": "I ___ to that restaurant before — that's why I knew the menu.", "options": ["went", "had been", "was going", "have been"], "a": "had been", "explanation": "Past perfect for prior experience relative to another past event."}, {"type": "mc", "q": "We ___ in Istanbul for 15 years before moving to the UK.", "options": ["lived", "had lived", "were living", "have lived"], "a": "had lived", "explanation": "Past perfect for completed duration before another past event."}, {"type": "correct", "q": "We are doing a lot of plans for next year.", "a": ["We are making a lot of plans for next year."], "explanation": "Collocation: 'make plans', not 'do plans'."}, {"type": "mc", "q": "I usually ___ tea, but today I'm drinking coffee.", "options": ["am drinking", "drink", "drank", "have drunk"], "a": "drink", "explanation": "Present simple for habits; present continuous for now."}, {"type": "mc", "q": "By the time the film ended, I ___ asleep.", "options": ["fell", "had fallen", "was falling", "have fallen"], "a": "had fallen", "explanation": "Past perfect for an event completed before another past event."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
