<title>Modal Verbs (and &#x27;can be able to&#x27;) — Personalised Exercise for Deniz</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #fdf6f9 0%, #f3eaf2 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #be185d; }
  .question-card {
    background: #fafafa;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;

    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #be185d; }

  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #be185d; background: #fdf2f8; }
  .option.selected { border-color: #be185d; background: #fce7f3; }
  .check-btn {
    margin-top: 12px;

    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #9d174d; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;

    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #9d174d; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #fce7f3;
    color: #9d174d;
    padding: 2px 8px;

    margin-left: 6px;
  }

<body>
<div class="container">
  <header>
    <h1>Modal Verbs (and &#x27;can be able to&#x27;) — Personalised Exercise for Deniz</h1>
    <div class="meta">
      <span>Student: Deniz</span>
      <span>Topic: Modal Verbs (and &#x27;can be able to&#x27;)</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "correct", "q": "You can able to reach your sources at home.", "a": ["You can reach your sources at home.", "You are able to reach your sources at home."], "explanation": "Never combine 'can' and 'be able to'. Choose one: 'can' (modal) OR 'be able to' (paraphrasis)."}, {"type": "correct", "q": "They can able to walk inside the farm.", "a": ["They can walk inside the farm.", "They are able to walk inside the farm."], "explanation": "Drop one of the two. 'Can be able to' / 'can able to' is a fossilised double modal."}, {"type": "correct", "q": "After 10 days, I can be able to go.", "a": ["After 10 days, I can go.", "After 10 days, I will be able to go."], "explanation": "Choose 'can' (modal) OR 'will be able to' (future ability). Never both."}, {"type": "correct", "q": "Even I can be able to fly.", "a": ["Even I can fly.", "Even I am able to fly."], "explanation": "Same double-modal error. Use one form."}, {"type": "correct", "q": "Because I can able to watch on my phone.", "a": ["Because I can watch on my phone.", "Because I am able to watch on my phone."], "explanation": "Drop the redundant 'able to'. 'Can' already expresses ability."}, {"type": "mc", "q": "By next year, I ___ to speak fluent English.", "options": ["can", "will can", "will be able", "will be able to"], "a": "will be able to", "explanation": "Future ability uses 'will be able to', not 'will can' (no double modal)."}, {"type": "mc", "q": "When I was a child, I ___ swim very well.", "options": ["can", "could", "was able to", "can be able to"], "a": "could", "explanation": "Past ability: 'could' or 'was able to'. ('Was able to' is for a specific occasion.)"}, {"type": "mc", "q": "She ___ run a marathon last year, even though she was unfit.", "options": ["could", "was able to", "can", "can be able to"], "a": "was able to", "explanation": "For a specific past achievement, use 'was/were able to' (not 'could')."}, {"type": "mc", "q": "You ___ smoke here — it's a hospital.", "options": ["mustn't", "don't have to", "shouldn't have", "needn't"], "a": "mustn't", "explanation": "'Mustn't' = prohibition."}, {"type": "mc", "q": "You ___ wear formal clothes; the office is casual.", "options": ["mustn't", "don't have to", "shouldn't", "can't"], "a": "don't have to", "explanation": "'Don't have to' = no obligation (it's optional)."}, {"type": "mc", "q": "I ___ told her — now she's upset.", "options": ["shouldn't have", "wouldn't have", "mustn't", "needn't"], "a": "shouldn't have", "explanation": "'Shouldn't have + past participle' = past regret for an action taken."}, {"type": "mc", "q": "He ___ be at home; his car is in the driveway.", "options": ["must", "might", "can", "should"], "a": "must", "explanation": "'Must' for strong logical deduction in the present."}, {"type": "mc", "q": "She ___ have arrived already; the train left two hours ago.", "options": ["can't", "mustn't", "shouldn't", "needn't"], "a": "can't", "explanation": "'Can't have + past participle' = impossible deduction about the past."}, {"type": "mc", "q": "You ___ have bought that — I already had one.", "options": ["needn't", "mustn't", "can't", "shouldn't"], "a": "needn't", "explanation": "'Needn't have + past participle' = it was unnecessary, but you did it."}, {"type": "mc", "q": "If I had more money, I ___ buy a bigger Mazda.", "options": ["will", "would", "can", "must"], "a": "would", "explanation": "Second conditional: 'would + base form'."}, {"type": "mc", "q": "If I had known earlier, I ___ come.", "options": ["will", "would", "would have", "had"], "a": "would have", "explanation": "Third conditional: 'would have + past participle'."}, {"type": "correct", "q": "You should to call her.", "a": ["You should call her."], "explanation": "After modal verbs, use the base form — no 'to'."}, {"type": "correct", "q": "He must to leave now.", "a": ["He must leave now.", "He has to leave now."], "explanation": "After 'must' use base form; 'have to' takes 'to + base'."}, {"type": "mc", "q": "It ___ rain later — better take an umbrella.", "options": ["might", "must", "ought", "should"], "a": "might", "explanation": "'Might' = possibility."}, {"type": "mc", "q": "You ___ have told me earlier — I would have helped.", "options": ["could", "must", "can", "need"], "a": "could", "explanation": "'Could have + past participle' = past unrealised possibility."}, {"type": "correct", "q": "I would can finish this tomorrow.", "a": ["I could finish this tomorrow.", "I will be able to finish this tomorrow."], "explanation": "Don't combine two modals. Use 'could' or 'will be able to'."}, {"type": "correct", "q": "She can to drive a manual car.", "a": ["She can drive a manual car."], "explanation": "After 'can', use the base form — no 'to'."}, {"type": "correct", "q": "You should can speak two languages by now.", "a": ["You should be able to speak two languages by now."], "explanation": "Don't stack modals. 'Should + be able to + base'."}, {"type": "correct", "q": "I will can join you tomorrow.", "a": ["I will be able to join you tomorrow."], "explanation": "Future ability: 'will be able to', never 'will can'."}, {"type": "mc", "q": "After moving here, I ___ adapt very quickly.", "options": ["could", "was able to", "can", "can be able to"], "a": "was able to", "explanation": "Specific past achievement → 'was able to', not 'could'."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
