<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prepositions — Personalised Exercise for Deniz</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #fdf6f9 0%, #f3eaf2 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #be185d; }
  .question-card {
    background: #fafafa;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #be185d; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #be185d; background: #fdf2f8; }
  .option.selected { border-color: #be185d; background: #fce7f3; }
  .check-btn {
    margin-top: 12px;
    background: #be185d;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #9d174d; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #fdf2f8;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #9d174d; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #fce7f3;
    color: #9d174d;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Prepositions — Personalised Exercise for Deniz</h1>
    <div class="meta">
      <span>Student: Deniz</span>
      <span>Topic: Prepositions</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "correct", "q": "I actively listen podcast when I am cooking.", "a": ["I actively listen to podcasts when I am cooking."], "explanation": "'Listen' always takes 'to' before an object."}, {"type": "correct", "q": "We need to familiar the new words.", "a": ["We need to become familiar with the new words.", "We need to get used to the new words."], "explanation": "'Familiar' is an adjective, not a verb. Use 'become familiar with' or 'get used to'."}, {"type": "correct", "q": "In last meeting, we made a decision.", "a": ["In the last meeting, we made a decision.", "At the last meeting, we made a decision."], "explanation": "Use 'the' before 'last meeting'."}, {"type": "correct", "q": "In last one year, prices went up a lot.", "a": ["In the last year, prices went up a lot.", "Over the last year, prices have gone up a lot."], "explanation": "'In the last year' — no extra 'one', and use 'the'."}, {"type": "fill", "q": "It's spectacular ___ snorkelling.", "a": ["for"], "explanation": "'Spectacular for + activity' — the place is great for that activity."}, {"type": "fill", "q": "I'm interested ___ photography.", "a": ["in"], "explanation": "'Interested in' — fixed preposition."}, {"type": "fill", "q": "She is married ___ a Turkish engineer.", "a": ["to"], "explanation": "'Married to' (not 'married with' — Turkish calque)."}, {"type": "fill", "q": "It depends ___ the weather.", "a": ["on"], "explanation": "'Depend on' — fixed preposition."}, {"type": "fill", "q": "I'm afraid ___ flying long distances.", "a": ["of"], "explanation": "'Afraid of + noun/-ing'."}, {"type": "fill", "q": "He is responsible ___ the project.", "a": ["for"], "explanation": "'Responsible for + noun'."}, {"type": "fill", "q": "I'm looking forward ___ meeting you.", "a": ["to"], "explanation": "'Look forward to + -ing'. 'to' is a preposition here."}, {"type": "fill", "q": "Thank you ___ your message.", "a": ["for"], "explanation": "'Thank you for + noun/-ing'."}, {"type": "fill", "q": "We arrived ___ Istanbul at midnight.", "a": ["in"], "explanation": "'Arrive in' + city/country."}, {"type": "fill", "q": "I'll meet you ___ the airport.", "a": ["at"], "explanation": "'At' + specific location (airport, station, bus stop)."}, {"type": "fill", "q": "The shop is ___ the corner of the street.", "a": ["on", "at"], "explanation": "'On/at the corner' — both are acceptable."}, {"type": "fill", "q": "I was born ___ 1990.", "a": ["in"], "explanation": "Use 'in' with years, months, decades."}, {"type": "fill", "q": "The meeting starts ___ 3 pm.", "a": ["at"], "explanation": "Use 'at' with clock times."}, {"type": "fill", "q": "I'll see you ___ Friday.", "a": ["on"], "explanation": "Use 'on' with days and dates."}, {"type": "fill", "q": "She's good ___ cooking Italian food.", "a": ["at"], "explanation": "'Good at + noun/-ing'."}, {"type": "correct", "q": "We spent with them like at least eight hours.", "a": ["We spent at least eight hours with them.", "We spend at least eight hours with them every week."], "explanation": "Word order: 'spent X hours with them'. Past simple ('spent') for one occasion; present simple ('spend') for habits."}, {"type": "correct", "q": "I always think to my family when I'm abroad.", "a": ["I always think about my family when I'm abroad.", "I always think of my family when I'm abroad."], "explanation": "'Think about/of' (not 'think to')."}, {"type": "fill", "q": "She is fluent ___ three languages.", "a": ["in"], "explanation": "'Fluent in + language'."}, {"type": "fill", "q": "He apologised ___ being late.", "a": ["for"], "explanation": "'Apologise for + noun/-ing'."}, {"type": "correct", "q": "They reply me very quickly.", "a": ["They reply to me very quickly."], "explanation": "'Reply' takes 'to' before an object."}, {"type": "correct", "q": "In last summer, we went to Spain.", "a": ["Last summer, we went to Spain."], "explanation": "Drop 'in' before 'last + season'."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
