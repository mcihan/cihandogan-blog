<!DOCTYPE html>

<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixed Comprehensive Test 3 — Deniz</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #fdf6f9 0%, #f3eaf2 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #be185d; }
  .question-card {
    background: #fafafa;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #be185d; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #be185d; background: #fdf2f8; }
  .option.selected { border-color: #be185d; background: #fce7f3; }
  .check-btn {
    margin-top: 12px;
    background: #be185d;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #9d174d; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #fdf2f8;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #9d174d; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #fce7f3;
    color: #9d174d;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Mixed Comprehensive Test 3 — Deniz</h1>
    <div class="meta">
      <span>Student: Deniz</span>
      <span>Topic: Mixed (All Weakness Areas)</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "fill", "q": "He is in ___ hospital after the accident.", "a": ["-", "x", "no article", ""], "explanation": "'In hospital' (UK) = as a patient — no article. (US English uses 'in the hospital'.)", "topic": "articles"}, {"type": "correct", "q": "The religion makes people a bit silly.", "a": ["Religion makes people a bit silly."], "explanation": "Abstract nouns in general statements take zero article.", "topic": "articles"}, {"type": "mc", "q": "She ___ this car for two years before selling it.", "options": ["drove", "had driven", "was driving", "has driven"], "a": "had driven", "explanation": "Past perfect for a completed duration before another past event.", "topic": "tenses"}, {"type": "correct", "q": "In last year, we made a lot of plans.", "a": ["Last year, we made a lot of plans."], "explanation": "Drop 'in' before 'last year'. (Same for 'last week', 'last month'.)", "topic": "tenses"}, {"type": "fill", "q": "The meeting starts ___ 3 pm.", "a": ["at"], "explanation": "Use 'at' with clock times.", "topic": "prepositions"}, {"type": "fill", "q": "I'll see you ___ Friday.", "a": ["on"], "explanation": "Use 'on' with days and dates.", "topic": "prepositions"}, {"type": "correct", "q": "All the staff has been informed.", "a": ["All the staff have been informed.", "All the staff has been informed."], "explanation": "'Staff' as a collective is often treated as plural in UK English ('have'). US English allows singular too.", "topic": "plurals"}, {"type": "correct", "q": "I have a lot of homeworks tonight.", "a": ["I have a lot of homework tonight."], "explanation": "'Homework' is uncountable.", "topic": "plurals"}, {"type": "rewrite", "q": "Use a reduced relative: 'The fruit that is sold at the market is fresh.'", "a": ["The fruit sold at the market is fresh."], "explanation": "Reduced relative — drop 'that is' for past participles.", "topic": "sentence_structure"}, {"type": "rewrite", "q": "Use a reduced relative: 'The people who are living next door are friendly.'", "a": ["The people living next door are friendly."], "explanation": "Drop 'who are' for -ing forms.", "topic": "sentence_structure"}, {"type": "correct", "q": "You should to call her.", "a": ["You should call her."], "explanation": "After modal verbs, use the base form — no 'to'.", "topic": "modal_verbs"}, {"type": "correct", "q": "He must to leave now.", "a": ["He must leave now.", "He has to leave now."], "explanation": "After 'must' use base form; 'have to' takes 'to + base'.", "topic": "modal_verbs"}, {"type": "mc", "q": "I wish I ___ more languages.", "options": ["speak", "spoke", "had spoken", "would speak"], "a": "spoke", "explanation": "'I wish + past simple' for unreal present.", "topic": "conditionals"}, {"type": "mc", "q": "I wish I ___ harder at school.", "options": ["studied", "had studied", "would study", "study"], "a": "had studied", "explanation": "'I wish + past perfect' for regret about the past.", "topic": "conditionals"}, {"type": "mc", "q": "The product is high-quality. ___ , it is affordable.", "options": ["In addition", "In contrast", "Otherwise", "On the contrary"], "a": "In addition", "explanation": "'In addition' adds further information.", "topic": "connectors"}, {"type": "correct", "q": "Because of this is very expensive, we don't buy it.", "a": ["Because this is very expensive, we don't buy it.", "Because of the price, we don't buy it."], "explanation": "'Because' takes a clause; 'because of' takes a noun phrase.", "topic": "connectors"}, {"type": "correct", "q": "This route is more longer than the other one.", "a": ["This route is longer than the other one."], "explanation": "'Longer' is the comparative of 'long'. Never 'more longer'.", "topic": "comparatives"}, {"type": "correct", "q": "London is more bigger than Istanbul? I don't think so.", "a": ["Is London bigger than Istanbul? I don't think so."], "explanation": "'Bigger' is comparative — never add 'more'.", "topic": "comparatives"}, {"type": "mc", "q": "She ___ birth to a baby boy last week.", "options": ["gave", "made", "took", "did"], "a": "gave", "explanation": "'Give birth' is fixed.", "topic": "collocations"}, {"type": "mc", "q": "I need to ___ a doctor's appointment.", "options": ["do", "make", "take", "give"], "a": "make", "explanation": "'Make an appointment'.", "topic": "collocations"}, {"type": "correct", "q": "They are look really creepy.", "a": ["They look really creepy.", "They are really creepy-looking."], "explanation": "Don't use 'are' + 'look' together. Use 'look' as a verb, or 'creepy-looking' as a compound adjective.", "topic": "vocabulary"}, {"type": "correct", "q": "It was so spectacular to snorkeling there.", "a": ["It was so spectacular for snorkelling there.", "It was so spectacular to snorkel there."], "explanation": "'Spectacular for + -ing' or 'spectacular to + base form'.", "topic": "vocabulary"}, {"type": "correct", "q": "He is more taller than his brother.", "a": ["He is taller than his brother."], "explanation": "'Taller' is already comparative — never 'more + -er'.", "topic": "word_form"}, {"type": "correct", "q": "This is a very interested topic.", "a": ["This is a very interesting topic."], "explanation": "-ing for things that cause the feeling: 'interesting topic'.", "topic": "word_form"}, {"type": "rewrite", "q": "Use a reduced relative: 'The car that was parked outside is mine.'", "a": ["The car parked outside is mine."], "explanation": "Drop 'that was' before a past participle.", "topic": "relative_clauses"}];
const SHOW_TOPIC_PILL = true;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
