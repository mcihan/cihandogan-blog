<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plural Forms &amp; Countable/Uncountable — Personalised Exercise for Deniz</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #fdf6f9 0%, #f3eaf2 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #be185d; }
  .question-card {
    background: #fafafa;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #be185d; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #be185d; background: #fdf2f8; }
  .option.selected { border-color: #be185d; background: #fce7f3; }
  .check-btn {
    margin-top: 12px;
    background: #be185d;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #9d174d; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #fdf2f8;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #9d174d; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #fce7f3;
    color: #9d174d;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Plural Forms &amp; Countable/Uncountable — Personalised Exercise for Deniz</h1>
    <div class="meta">
      <span>Student: Deniz</span>
      <span>Topic: Plural Forms &amp; Countable/Uncountable</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "correct", "q": "I don't buy so much things.", "a": ["I don't buy so many things."], "explanation": "'Many' goes with countable plural nouns; 'much' goes with uncountables."}, {"type": "correct", "q": "There were much people at the conference.", "a": ["There were many people at the conference.", "There were a lot of people at the conference."], "explanation": "'People' is countable plural → 'many' or 'a lot of'."}, {"type": "correct", "q": "How much friends do you have here?", "a": ["How many friends do you have here?"], "explanation": "'How many + countable plural'."}, {"type": "correct", "q": "I don't have so much money these days.", "a": ["I don't have so much money these days."], "explanation": "'Money' is uncountable → 'much' is correct here. (No change needed.)"}, {"type": "correct", "q": "There is many reasons to learn English.", "a": ["There are many reasons to learn English."], "explanation": "Plural subject → 'are'."}, {"type": "correct", "q": "60% of the people is like that.", "a": ["60% of the people are like that."], "explanation": "'People' is plural in English → 'are', not 'is'."}, {"type": "correct", "q": "My luggages are heavy.", "a": ["My luggage is heavy."], "explanation": "'Luggage' is uncountable — no plural."}, {"type": "correct", "q": "She gave me some advices about the trip.", "a": ["She gave me some advice about the trip.", "She gave me a piece of advice about the trip."], "explanation": "'Advice' is uncountable."}, {"type": "correct", "q": "I need more informations before I decide.", "a": ["I need more information before I decide."], "explanation": "'Information' is uncountable."}, {"type": "correct", "q": "The feedbacks from customers were positive.", "a": ["The feedback from customers was positive."], "explanation": "'Feedback' is uncountable → no plural and singular verb."}, {"type": "correct", "q": "He gave me three good advices.", "a": ["He gave me three good pieces of advice.", "He gave me some good advice."], "explanation": "Count uncountables with a measure noun: 'pieces of advice'."}, {"type": "correct", "q": "We bought a lot of furnitures for the new house.", "a": ["We bought a lot of furniture for the new house."], "explanation": "'Furniture' is uncountable."}, {"type": "correct", "q": "There were many childs in the park.", "a": ["There were many children in the park."], "explanation": "Irregular plural: child → children."}, {"type": "correct", "q": "I lost two of my tooth.", "a": ["I lost two of my teeth."], "explanation": "Irregular plural: tooth → teeth."}, {"type": "correct", "q": "Many womans came to the meeting.", "a": ["Many women came to the meeting."], "explanation": "Irregular plural: woman → women."}, {"type": "correct", "q": "My foots hurt after the hike.", "a": ["My feet hurt after the hike."], "explanation": "Irregular plural: foot → feet."}, {"type": "correct", "q": "All the staff has been informed.", "a": ["All the staff have been informed.", "All the staff has been informed."], "explanation": "'Staff' as a collective is often treated as plural in UK English ('have'). US English allows singular too."}, {"type": "correct", "q": "I have a lot of homeworks tonight.", "a": ["I have a lot of homework tonight."], "explanation": "'Homework' is uncountable."}, {"type": "correct", "q": "The news are bad today.", "a": ["The news is bad today."], "explanation": "'News' is uncountable singular → 'is'."}, {"type": "correct", "q": "My hairs are wet.", "a": ["My hair is wet."], "explanation": "'Hair' as a collective is uncountable. (Individual hairs would be countable.)"}, {"type": "correct", "q": "There were so much cars on the motorway.", "a": ["There were so many cars on the motorway."], "explanation": "'Cars' is countable plural → 'many'."}, {"type": "correct", "q": "I have so much friends in Istanbul.", "a": ["I have so many friends in Istanbul."], "explanation": "'Friends' is countable plural → 'many'."}, {"type": "correct", "q": "How much cars do they own?", "a": ["How many cars do they own?"], "explanation": "'Cars' is countable → 'how many'."}, {"type": "correct", "q": "There are a lot of equipments here.", "a": ["There is a lot of equipment here."], "explanation": "'Equipment' is uncountable → singular verb, no plural."}, {"type": "correct", "q": "I drank two waters at lunch.", "a": ["I drank two glasses of water at lunch.", "I drank two bottles of water at lunch."], "explanation": "'Water' is uncountable. Use a counter: 'glasses/bottles of water'."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
