<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mixed Comprehensive Test 2 — Deniz</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #fdf6f9 0%, #f3eaf2 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #be185d; }
  .question-card {
    background: #fafafa;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #be185d; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #be185d; background: #fdf2f8; }
  .option.selected { border-color: #be185d; background: #fce7f3; }
  .check-btn {
    margin-top: 12px;
    background: #be185d;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #9d174d; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #fdf2f8;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #9d174d; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #fce7f3;
    color: #9d174d;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Mixed Comprehensive Test 2 — Deniz</h1>
    <div class="meta">
      <span>Student: Deniz</span>
      <span>Topic: Mixed (All Weakness Areas)</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "correct", "q": "If you want, you can go to home.", "a": ["If you want, you can go home."], "explanation": "'Go home' is a fixed expression — no preposition, no article.", "topic": "articles"}, {"type": "fill", "q": "I have to be at ___ home tonight by 9 pm.", "a": ["-", "x", "no article", ""], "explanation": "'At home' takes zero article — fixed expression.", "topic": "articles"}, {"type": "mc", "q": "We ___ snorkelling in Palawan last summer — it was spectacular.", "options": ["went", "were going", "have gone", "had gone"], "a": "went", "explanation": "Past simple for a completed past event with a specific time.", "topic": "tenses"}, {"type": "mc", "q": "At 6 pm tomorrow, I ___ dinner with my mother.", "options": ["have", "will have", "am having", "will be having"], "a": "will be having", "explanation": "Future continuous for an action in progress at a specific future time.", "topic": "tenses"}, {"type": "fill", "q": "I'm afraid ___ flying long distances.", "a": ["of"], "explanation": "'Afraid of + noun/-ing'.", "topic": "prepositions"}, {"type": "fill", "q": "He is responsible ___ the project.", "a": ["for"], "explanation": "'Responsible for + noun'.", "topic": "prepositions"}, {"type": "correct", "q": "I need more informations before I decide.", "a": ["I need more information before I decide."], "explanation": "'Information' is uncountable.", "topic": "plurals"}, {"type": "correct", "q": "The feedbacks from customers were positive.", "a": ["The feedback from customers was positive."], "explanation": "'Feedback' is uncountable → no plural and singular verb.", "topic": "plurals"}, {"type": "correct", "q": "Because of this is very expensive, I didn't buy it.", "a": ["Because this is very expensive, I didn't buy it.", "Because of the price, I didn't buy it."], "explanation": "'Because of' takes a noun phrase; 'because' takes a clause.", "topic": "sentence_structure"}, {"type": "rewrite", "q": "Rewrite using 'so that': 'I bought a Mazda. I wanted to save fuel.'", "a": ["I bought a Mazda so that I could save fuel."], "explanation": "'So that + clause' = purpose.", "topic": "sentence_structure"}, {"type": "mc", "q": "You ___ smoke here — it's a hospital.", "options": ["mustn't", "don't have to", "shouldn't have", "needn't"], "a": "mustn't", "explanation": "'Mustn't' = prohibition.", "topic": "modal_verbs"}, {"type": "mc", "q": "You ___ wear formal clothes; the office is casual.", "options": ["mustn't", "don't have to", "shouldn't", "can't"], "a": "don't have to", "explanation": "'Don't have to' = no obligation (it's optional).", "topic": "modal_verbs"}, {"type": "mc", "q": "If I had studied medicine, I ___ a doctor now.", "options": ["will be", "would be", "would have been", "am"], "a": "would be", "explanation": "Mixed conditional: past condition + present result.", "topic": "conditionals"}, {"type": "mc", "q": "If you ___ to me, you wouldn't be in this mess.", "options": ["listened", "had listened", "listen", "would listen"], "a": "had listened", "explanation": "Mixed conditional: past hypothetical condition + present result.", "topic": "conditionals"}, {"type": "mc", "q": "___ the rain, we went to the picnic.", "options": ["Although", "Despite", "However", "Because"], "a": "Despite", "explanation": "'Despite + noun/-ing' (not + clause).", "topic": "connectors"}, {"type": "mc", "q": "___ it was raining, we went to the picnic.", "options": ["Although", "Despite", "However", "Because of"], "a": "Although", "explanation": "'Although + clause' with subject + verb.", "topic": "connectors"}, {"type": "mc", "q": "This dish is ___ than the one we had yesterday.", "options": ["more delicious", "deliciouser", "more deliciouser", "most delicious"], "a": "more delicious", "explanation": "Long adjectives (3+ syllables) use 'more + adjective'.", "topic": "comparatives"}, {"type": "mc", "q": "Istanbul is ___ than Ankara.", "options": ["more crowded", "crowdeder", "more crowdeder", "crowdedest"], "a": "more crowded", "explanation": "Two-syllable adjectives ending in -ed/-ing use 'more'.", "topic": "comparatives"}, {"type": "correct", "q": "Let's take a holiday next month.", "a": ["Let's go on holiday next month.", "Let's take a holiday next month.", "Let's have a holiday next month."], "explanation": "Collocations: 'go on holiday', 'take a holiday', 'have a holiday' are all fine.", "topic": "collocations"}, {"type": "correct", "q": "I want to do a course in marketing.", "a": ["I want to take a course in marketing.", "I want to do a course in marketing."], "explanation": "Both 'take a course' and 'do a course' are correct.", "topic": "collocations"}, {"type": "mc", "q": "Replace 'very expensive' with a single, more vivid word:", "options": ["pricey", "cheap", "modest", "plain"], "a": "pricey", "explanation": "'Pricey / costly / steep / exorbitant' — varies the register.", "topic": "vocabulary"}, {"type": "mc", "q": "Choose a precise verb: 'Can you ___ this email by tomorrow?'", "options": ["do", "handle", "make", "take"], "a": "handle", "explanation": "'Handle a task / email / situation' is more precise than 'do'.", "topic": "vocabulary"}, {"type": "correct", "q": "The new policy will affect on many people.", "a": ["The new policy will affect many people."], "explanation": "'Affect' is transitive — no preposition. ('Have an effect on' takes 'on'.)", "topic": "word_form"}, {"type": "correct", "q": "I am think it is a good idea.", "a": ["I think it is a good idea."], "explanation": "Present simple, not 'am + think'. Stative verbs don't usually take continuous.", "topic": "word_form"}, {"type": "correct", "q": "I have a Mazda which I love it.", "a": ["I have a Mazda which I love.", "I have a Mazda that I love."], "explanation": "In a relative clause, don't repeat the object pronoun ('it') — the relative pronoun replaces it.", "topic": "relative_clauses"}];
const SHOW_TOPIC_PILL = true;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
