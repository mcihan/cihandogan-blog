<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow"><script>if(sessionStorage.getItem("engstudy-auth")!=="ea3312fe029acf5e863a0e7f32a9b9985abff30fb711897cbc19eb64a982c36d")location.replace("/eng-study/");</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Passive Voice — Personalised Exercise for Deniz</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #fdf6f9 0%, #f3eaf2 100%);
    color: #1f2937;
    margin: 0;
    padding: 24px;
    min-height: 100vh;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    padding: 32px;
  }
  header { border-bottom: 1px solid #e5e7eb; padding-bottom: 16px; margin-bottom: 24px; }
  h1 { margin: 0 0 4px; font-size: 22px; color: #111827; }
  .meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #6b7280; }
  .meta span { background: #f3f4f6; padding: 4px 10px; border-radius: 999px; }
  .progress { font-weight: 600; color: #be185d; }
  .question-card {
    background: #fafafa;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .qtype { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 6px; }
  .qtext { font-size: 16px; margin-bottom: 12px; line-height: 1.5; }
  input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #be185d; }
  .options { display: grid; gap: 8px; }
  .option {
    padding: 10px 14px;
    border: 1.5px solid #d1d5db;
    border-radius: 8px;
    cursor: pointer;
    background: #fff;
    transition: all 0.2s;
    font-size: 15px;
  }
  .option:hover { border-color: #be185d; background: #fdf2f8; }
  .option.selected { border-color: #be185d; background: #fce7f3; }
  .check-btn {
    margin-top: 12px;
    background: #be185d;
    color: #fff;
    border: none;
    padding: 9px 20px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .check-btn:hover { background: #9d174d; }
  .check-btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .feedback {
    margin-top: 12px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
  }
  .feedback.correct { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  .feedback.incorrect { background: #fee2e2; color: #991b1b; border-left: 4px solid #ef4444; }
  .feedback strong { display: block; margin-bottom: 4px; }
  .feedback .answer { font-style: italic; margin-top: 4px; }
  .feedback .explain { margin-top: 6px; color: #4b5563; }
  .summary {
    margin-top: 24px;
    padding: 20px;
    background: #fdf2f8;
    border-radius: 12px;
    text-align: center;
    display: none;
  }
  .summary h2 { margin: 0 0 8px; color: #9d174d; }
  .topic-pill {
    display: inline-block;
    font-size: 11px;
    background: #fce7f3;
    color: #9d174d;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Passive Voice — Personalised Exercise for Deniz</h1>
    <div class="meta">
      <span>Student: Deniz</span>
      <span>Topic: Passive Voice</span>
      <span>Level: B2</span>
      <span class="progress" id="progress">Question 1 / 25</span>
      <span id="score">Score: 0 / 0</span>
    </div>
  </header>
  <div id="quiz"></div>
  <div class="summary" id="summary">
    <h2>🎉 Exercise complete!</h2>
    <p id="summary-text"></p>
  </div>
</div>
<script>
const QUESTIONS = [{"type": "rewrite", "q": "Make passive: 'They make decisions every week.'", "a": ["Decisions are made every week.", "Decisions are made by them every week."], "explanation": "Present simple passive: am/is/are + past participle."}, {"type": "rewrite", "q": "Make passive: 'The team finished the project yesterday.'", "a": ["The project was finished yesterday.", "The project was finished by the team yesterday."], "explanation": "Past simple passive: was/were + past participle."}, {"type": "rewrite", "q": "Make passive: 'They have released a new policy.'", "a": ["A new policy has been released."], "explanation": "Present perfect passive: has/have been + past participle."}, {"type": "rewrite", "q": "Make passive: 'The government will introduce new rules.'", "a": ["New rules will be introduced.", "New rules will be introduced by the government."], "explanation": "Future passive: will be + past participle."}, {"type": "rewrite", "q": "Make passive: 'They are repairing the road now.'", "a": ["The road is being repaired now."], "explanation": "Present continuous passive: am/is/are being + past participle."}, {"type": "rewrite", "q": "Make passive: 'They were repairing the road when I drove past.'", "a": ["The road was being repaired when I drove past."], "explanation": "Past continuous passive: was/were being + past participle."}, {"type": "rewrite", "q": "Make passive: 'They had completed the work before lunch.'", "a": ["The work had been completed before lunch."], "explanation": "Past perfect passive: had been + past participle."}, {"type": "rewrite", "q": "Make passive: 'They will have finished it by Monday.'", "a": ["It will have been finished by Monday."], "explanation": "Future perfect passive: will have been + past participle."}, {"type": "mc", "q": "The window ___ broken last night.", "options": ["is", "was", "has", "were"], "a": "was", "explanation": "Past simple passive (singular subject) → 'was'."}, {"type": "mc", "q": "This building ___ in 1850.", "options": ["built", "was built", "has built", "builds"], "a": "was built", "explanation": "Past simple passive."}, {"type": "mc", "q": "My laptop ___ fixed at the moment.", "options": ["is", "is being", "has", "being"], "a": "is being", "explanation": "Present continuous passive: is being + past participle."}, {"type": "mc", "q": "The bug ___ already ___ .", "options": ["has / fixed", "has been / fixed", "is / fixed", "was / fixed"], "a": "has been / fixed", "explanation": "Present perfect passive: has/have been + past participle."}, {"type": "correct", "q": "The cake was eat by the children.", "a": ["The cake was eaten by the children."], "explanation": "Past participle of 'eat' is 'eaten'."}, {"type": "correct", "q": "The report is writed by my colleague.", "a": ["The report is written by my colleague."], "explanation": "Past participle of 'write' is 'written'."}, {"type": "correct", "q": "The decisions are giving by management.", "a": ["The decisions are made by management."], "explanation": "Use 'make a decision' (not 'give a decision'). Passive: 'are made'."}, {"type": "rewrite", "q": "Use a get-passive: 'My car was fixed yesterday.'", "a": ["My car got fixed yesterday."], "explanation": "Informal/spoken passive uses 'get + past participle'."}, {"type": "rewrite", "q": "Use a get-passive: 'The window was broken during the storm.'", "a": ["The window got broken during the storm."], "explanation": "'Get + past participle' is common in informal/spoken passives."}, {"type": "mc", "q": "This problem ___ by the team tomorrow.", "options": ["will solve", "will be solving", "will be solved", "is solved"], "a": "will be solved", "explanation": "Future passive: will be + past participle."}, {"type": "rewrite", "q": "Make passive (no agent): 'Someone stole my wallet.'", "a": ["My wallet was stolen."], "explanation": "Drop 'by + agent' when the agent is unknown or unimportant."}, {"type": "rewrite", "q": "Make passive: 'People in our company speak English every day.'", "a": ["English is spoken in our company every day."], "explanation": "Present simple passive."}, {"type": "mc", "q": "The keys ___ on the table.", "options": ["leave", "were left", "are leaving", "left"], "a": "were left", "explanation": "Past simple passive (plural subject) → 'were left'."}, {"type": "rewrite", "q": "Make passive: 'My manager has approved the request.'", "a": ["The request has been approved by my manager.", "The request has been approved."], "explanation": "Present perfect passive."}, {"type": "correct", "q": "The book was wrote by him in 2010.", "a": ["The book was written by him in 2010."], "explanation": "Past participle of 'write' is 'written'."}, {"type": "rewrite", "q": "Make passive: 'We must complete the report by Friday.'", "a": ["The report must be completed by Friday."], "explanation": "Modal passive: modal + be + past participle."}, {"type": "correct", "q": "The package will deliver tomorrow.", "a": ["The package will be delivered tomorrow."], "explanation": "Passive needs 'be' before the past participle."}];
const SHOW_TOPIC_PILL = false;
let answered = 0;
let correct = 0;

function normalise(s) {
  return s.trim().toLowerCase().replace(/[.,!?;:'"`]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer(idx, userAnswer) {
  const q = QUESTIONS[idx];
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const userN = normalise(userAnswer);
  return accepted.some(a => normalise(a) === userN);
}

function renderQuestion(q, idx) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'q-' + idx;

  const typeLabel = {
    mc: 'Multiple Choice',
    fill: 'Fill in the Blank',
    correct: 'Sentence Correction',
    choose: 'Choose the Correct Word',
    rewrite: 'Rewrite the Sentence'
  }[q.type] || 'Question';

  let topicPill = '';
  if (SHOW_TOPIC_PILL && q.topic) topicPill = '<span class="topic-pill">' + q.topic.replace(/_/g, ' ') + '</span>';

  card.innerHTML = '<div class="qtype">' + (idx + 1) + '. ' + typeLabel + topicPill + '</div>' +
                   '<div class="qtext">' + q.q + '</div>';

  if (q.type === 'mc' || q.type === 'choose') {
    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    let selected = null;
    q.options.forEach(opt => {
      const el = document.createElement('div');
      el.className = 'option';
      el.textContent = opt;
      el.onclick = () => {
        if (card.dataset.done) return;
        optsDiv.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        selected = opt;
      };
      optsDiv.appendChild(el);
    });
    card.appendChild(optsDiv);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      if (!selected) { alert('Please choose an option.'); return; }
      finish(card, idx, selected);
    };
    card.appendChild(btn);
  } else {
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = q.type === 'rewrite' ? 'Type your full rewrite…' :
                        q.type === 'correct' ? 'Type the corrected sentence…' :
                        'Your answer…';
    card.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'check-btn';
    btn.textContent = 'Check Answer';
    btn.onclick = () => {
      const val = input.value.trim();
      if (!val) { alert('Please type an answer.'); return; }
      finish(card, idx, val);
    };
    card.appendChild(btn);

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') btn.click();
    });
  }

  const fb = document.createElement('div');
  fb.className = 'feedback';
  card.appendChild(fb);
  return card;
}

function finish(card, idx, userAnswer) {
  if (card.dataset.done) return;
  card.dataset.done = '1';
  const q = QUESTIONS[idx];
  const ok = checkAnswer(idx, userAnswer);
  const fb = card.querySelector('.feedback');
  const accepted = Array.isArray(q.a) ? q.a : [q.a];
  const primaryAnswer = accepted[0];
  if (ok) {
    fb.className = 'feedback correct';
    fb.innerHTML = '<strong>✅ Correct</strong>' +
                   '<div class="explain">' + q.explanation + '</div>';
    correct++;
  } else {
    fb.className = 'feedback incorrect';
    fb.innerHTML = '<strong>❌ Incorrect</strong>' +
                   '<div class="answer">Correct answer: ' + primaryAnswer + '</div>' +
                   '<div class="explain">' + q.explanation + '</div>';
  }
  fb.style.display = 'block';
  card.querySelectorAll('.option, input, button').forEach(el => {
    if (el.tagName === 'BUTTON') el.disabled = true;
    else if (el.tagName === 'INPUT') el.readOnly = true;
  });
  answered++;
  document.getElementById('score').textContent = 'Score: ' + correct + ' / ' + answered;
  if (answered === QUESTIONS.length) {
    const s = document.getElementById('summary');
    document.getElementById('summary-text').textContent =
      'You scored ' + correct + ' out of ' + QUESTIONS.length + '. (' +
      Math.round(100 * correct / QUESTIONS.length) + '%)';
    s.style.display = 'block';
    s.scrollIntoView({ behavior: 'smooth' });
  }
}

function init() {
  const quiz = document.getElementById('quiz');
  QUESTIONS.forEach((q, idx) => quiz.appendChild(renderQuestion(q, idx)));
  document.getElementById('progress').textContent = 'Total: ' + QUESTIONS.length + ' questions';
}
init();
</script>
</body>
</html>
