<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#F8FAFC" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#334155">Shared Database Architecture — Before Migration</text>

  <!-- Services row -->
  <!-- Service A -->
  <rect x="30" y="65" width="120" height="50" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="90" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Payment</text>
  <text x="90" y="102" text-anchor="middle" font-size="10" fill="#3B82F6">Service</text>

  <!-- Service B -->
  <rect x="170" y="65" width="120" height="50" rx="8" fill="#FCE7F3" stroke="#F9A8D4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="230" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#9D174D">Account</text>
  <text x="230" y="102" text-anchor="middle" font-size="10" fill="#DB2777">Service</text>

  <!-- Service C -->
  <rect x="310" y="65" width="120" height="50" rx="8" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#065F46">Reward</text>
  <text x="370" y="102" text-anchor="middle" font-size="10" fill="#059669">Service</text>

  <!-- Service D -->
  <rect x="450" y="65" width="120" height="50" rx="8" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="510" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">Credential</text>
  <text x="510" y="102" text-anchor="middle" font-size="10" fill="#D97706">Service</text>

  <!-- Service E -->
  <rect x="590" y="65" width="120" height="50" rx="8" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#3730A3">Session</text>
  <text x="650" y="102" text-anchor="middle" font-size="10" fill="#6366F1">Service</text>

  <!-- More services indicator -->
  <text x="745" y="95" text-anchor="middle" font-size="20" fill="#94A3B8">...</text>

  <!-- Connection lines -->
  <line x1="90" y1="115" x2="400" y2="195" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="230" y1="115" x2="400" y2="195" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="370" y1="115" x2="400" y2="195" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="510" y1="115" x2="400" y2="195" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="650" y1="115" x2="400" y2="195" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Shared DB2 Database -->
  <!-- Cylinder shape -->
  <ellipse cx="400" cy="205" rx="90" ry="18" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <rect x="310" y="205" width="180" height="60" fill="#FEE2E2" stroke="none"/>
  <line x1="310" y1="205" x2="310" y2="265" stroke="#EF4444" stroke-width="2"/>
  <line x1="490" y1="205" x2="490" y2="265" stroke="#EF4444" stroke-width="2"/>
  <ellipse cx="400" cy="265" rx="90" ry="18" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="400" y="232" text-anchor="middle" font-size="14" font-weight="700" fill="#991B1B">IBM DB2</text>
  <text x="400" y="250" text-anchor="middle" font-size="11" fill="#B91C1C">Shared Database</text>

  <!-- Warning indicators -->
  <!-- Single point of failure -->
  <rect x="45" y="310" width="200" height="44" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.2"/>
  <text x="55" y="329" font-size="14" fill="#EA580C">&#9888;</text>
  <text x="75" y="329" font-size="11" font-weight="600" fill="#9A3412">Single Point of Failure</text>
  <text x="75" y="344" font-size="10" fill="#C2410C">One issue impacts all services</text>

  <!-- Large PCI scope -->
  <rect x="265" y="310" width="200" height="44" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.2"/>
  <text x="275" y="329" font-size="14" fill="#EA580C">&#128274;</text>
  <text x="297" y="329" font-size="11" font-weight="600" fill="#9A3412">Expanded PCI Scope</text>
  <text x="297" y="344" font-size="10" fill="#C2410C">Broader compliance surface</text>

  <!-- Cross-domain coupling -->
  <rect x="485" y="310" width="200" height="44" rx="6" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.2"/>
  <text x="495" y="329" font-size="14" fill="#EA580C">&#128279;</text>
  <text x="517" y="329" font-size="11" font-weight="600" fill="#9A3412">Cross-Domain Coupling</text>
  <text x="517" y="344" font-size="10" fill="#C2410C">Joins across domain tables</text>

  <!-- Cost label -->
  <rect x="265" y="370" width="270" height="36" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="400" y="393" text-anchor="middle" font-size="12" font-weight="700" fill="#991B1B">&#128176; High DB2 licensing cost — ~$1M/year</text>
</svg>
